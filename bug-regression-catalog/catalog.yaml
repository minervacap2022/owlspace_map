      bounded LRU) gates uploads; each mark POSTs exactly once.
    chaos:
      runner: 'cd Klik_one/liquid && ./gradlew :samples:composeApp:iosSimulatorArm64Test --tests "*HighlightDeduperTest*"'
      description: Live mark + its ±2min replay copy + its linear-backfill copy (same deviceTimestampMs+markId) must upload exactly once; distinct marks all pass.
    observable_signal: |
      On reconnect-replay the iOS/Android log shows "highlight mark=N ts=T already
      uploaded — skipping replay duplicate" for repeats; the backend receives one
      POST /audio/highlight per real mark, not one per replay.

  - id: BUG-2026-06-01-H
    title: OTA firmware endpoint must sit behind the nginx /api/v1/klik/ route, with its own /health
    date: 2026-06-01
    surface: backend
    source_files:
      - KK_frontendmobile/KK_frontendios/firmware_api.py
      - deploy/services/firmware_api.env
    user_visible_symptom: |
      The OTA endpoint (/api/v1/klik/firmware/{latest,file}) was first wired into
      klik_api (port 8004) because that service serves most /api/v1/* routes. But
      nginx has a MORE-SPECIFIC location block — `location /api/v1/klik/ { proxy_pass
      http://127.0.0.1:8002/...; }` — that preempts the general /api/v1/ -> 8004
      proxy. So the public URL https://hiklik.ai/api/v1/klik/firmware/latest resolved
      to a service WITHOUT the routes → the app would get 404 and never see an update.
      Same nginx-longest-prefix-precedence trap as the avatar /api/auth proxy gotcha.
      FINAL design: a DEDICATED firmware_api service on port 8005 (its own
      deploy/services/firmware_api.env), with nginx `location /api/v1/klik/firmware/
      { proxy_pass http://127.0.0.1:8005/...; }` (longer prefix wins) while
      /api/v1/klik/ -> 8002 (devices) stays. Kept off streaming_api(8002) so a
      firmware deploy never restarts live audio. The new service MUST expose an
      unconditional /health (no env deps) or the watchdog crash-loops it
      (see BUG-2026-05-31-G).
    chaos:
      runner: null   # requires live nginx + the running 8005 service + a valid JWT; verified by public curl + /health
      description: |
        After deploy: (1) GET http://127.0.0.1:8005/health returns 200; (2) an
        authenticated GET (Bearer JWT) to the PUBLIC host
        https://hiklik.ai/api/v1/klik/firmware/latest?hw_rev=1 returns the 0.3.1
        manifest — proving nginx routes /api/v1/klik/firmware/ to the dedicated
        service that defines the routes — NOT 404.
    observable_signal: |
      Service: `systemctl is-active klik@firmware_api` = active; :8005/health = 200.
      Route-registration: firmware_api.app.routes contains
      /api/v1/klik/firmware/latest and /api/v1/klik/firmware/file/{hw_rev}/{version}.
      Public reachability: the authenticated curl returns {available:true,version:"0.3.1",...}.
      Regression tripwire: a 404 from the public /api/v1/klik/firmware/latest, or the
      routes appearing on klik_api(8004)/streaming_api(8002) instead of 8005.
      Regression tripwire: the firmware routes appearing on klik_api(8004) instead of
      streaming_api(8002), or a 404 from the public /api/v1/klik/firmware/latest.

  - id: BUG-2026-06-01-P
