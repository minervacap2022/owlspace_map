        pattern: 'org\.gradle\.java\.home\s*=\s*/'
        message: "org.gradle.java.home is pinned to an absolute machine path in a tracked gradle.properties — breaks CI and every other machine. Machine-specific JDK paths belong in ~/.gradle/gradle.properties (untracked), not in VCS. CI selects its JDK via setup-java + -Dorg.gradle.java.home=$JAVA_HOME."
        file_types: [".properties"]
        exclude_files: ["test/", "build/"]
    chaos:
      runner: null   # The presence check above IS the guard. Runtime proof is the
                     # app-tests CI job itself: it now installs Temurin 17 and passes
                     # -Dorg.gradle.java.home=$JAVA_HOME, so a re-pinned absolute path
                     # no longer breaks CI — but the lint stops it returning to VCS.
