- id: BUG-2026-06-03-63b3f1
  title: sector_map py_stem resolver dropped dotted PACKAGE imports to a soft reference => empty (lying)
    blast radius on real Python repos
  date: 2026-06-03
  surface: tooling-ci
  source_files:
  - sector_map/extract.py
  - sector_map/test_cli.py
  user_visible_symptom: 'Running the sector map on a normal Python PACKAGE repo (dotted imports like

    `from core.m import helper`) reported NO depends_on edges and an empty blast

    radius — a false "nothing depends on this sector". An agent driving a pre-edit

    check would believe a foundational change was safe when consumers actually

    depend on it. Root cause: the py_stem import resolver did

    `stem_map.get(p.split("/")[0])`, which matches only FLAT bare-module imports

    (`import foo`); a package prefix like `core` is a directory, never a file stem,

    so dotted imports fell through to a soft `references` edge instead of a hard

    `depends_on`. The owlspace_map self-map uses flat bare-module imports, so it

    masked the gap until a packaged-import test surfaced it.

    '
  lint:
    rule: NO_PY_STEM_FIRST_COMPONENT_ONLY
    pattern: stem_map\.get\(p\.split\("/"\)\[0\]\)
    path: sector_map/extract.py
    presence: forbidden
    message: sector_map py_stem must resolve dotted PACKAGE imports (flat stem, then package-root, then
      trailing stem), not collapse to the first-component-only lookup; a match means packaged Python repos
      get empty (lying) blast radii again.
  chaos:
    runner: null
  observable_signal: 'python3 sector_map/test_cli.py — ConsumersRiskFirst.test_uncovered_consumer_is_surfaced_and_ordered_first

    builds a 2-sector Python PACKAGE repo (api imports `from core.m import helper`)

    and asserts `api` is in core''s blast_radius. If the resolver regresses to

    flat-only, api->core becomes a soft "references" edge, core''s blast_radius is

    empty, and the assertion fails. Equivalently: build_graph on any dotted-import

    Python repo must emit kind "depends_on" (not "references") for a cross-sector

    import.

    '
