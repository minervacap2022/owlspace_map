        pattern: 'isReturnDefaultValues\s*=\s*true'
        message: The Android mirror's composeApp testOptions MUST set unitTests.isReturnDefaultValues = true, or any commonTest exercising a logging path throws "android.util.Log not mocked" and testDebugUnitTest goes red.
        presence: required
        globs: ['Klik_newandroid/samples/composeApp/build.gradle.kts']
    observable_signal: |
      `grep -c 'isReturnDefaultValues = true' Klik_newandroid/samples/composeApp/build.gradle.kts`
      is >= 1, and `./gradlew :samples:composeApp:testDebugUnitTest` is BUILD
      SUCCESSFUL (no "not mocked" RuntimeException in any *.xml under
      build/test-results/testDebugUnitTest/).

  - id: BUG-2026-06-01-N
    title: KK_common.__getattr__ doesn't resolve advertised submodules (logger/config/…) — import-order-dependent AttributeError
    date: 2026-06-01
    surface: backend
    source_files:
      - KK_common/__init__.py
    user_visible_symptom: |
      KK_common/__init__.py lists submodules (auth, config, exceptions, logger,
      monitoring) in __all__, but its lazy __getattr__ only resolved a subset.
      `import KK_common; KK_common.logger...` (and `patch("KK_common.logger.X")`)
      therefore raised AttributeError on a fresh interpreter — and only "worked" if
      some earlier import happened to load the submodule first. A latent fragility:
      anything depending on attribute access (vs an explicit `from KK_common import
      logger`) breaks depending on import order. Fix: __getattr__ resolves any
      __all__ submodule via importlib.import_module, matching the existing lazy pattern.
    lint:
      - rule: KK_COMMON_MUST_LAZY_IMPORT_SUBMODULES
        pattern: 'importlib\.import_module'
        message: KK_common/__init__.py __getattr__ must lazily import the submodules advertised in __all__ via importlib, so attribute access resolves regardless of import order.
        presence: required
        globs: ['KK_common/__init__.py']
    observable_signal: |
      `python -c "import KK_common; print(KK_common.logger.__name__, KK_common.config.__name__)"`
      succeeds from a fresh interpreter (no prior submodule import). AttributeError =>
      the lazy resolver regressed and import-order fragility is back.

  - id: BUG-2026-06-02-A
    title: "[OBSOLETE v1.0.31 — per-session thinking REMOVED, 2-source model] bogus thinking_level in PATCH /api/sessions/:id NULL-wiped the reasoning override"
    date: 2026-06-02
    surface: backend
    source_files:
      - packages/owl-agent-server/src/http/routes/sessions.ts
    user_visible_symptom: |
      OwlSpace's reasoning-effort ("Medium") toggle: when a session already had a
      per-session thinking override, sending an UNRECOGNISED thinking_level to
      PATCH /api/sessions/:id silently cleared it. The route guarded on
      `body.thinking_level !== undefined` and then assigned
      `validThinkingLevel(body.thinking_level)`, which returns `undefined` for
      garbage; that `undefined` flowed into store.updateSession, where SQLite bound
      it as NULL and overwrote the column → the override reverted to "inherit the
      owlbot" with no error. Caught by a real-env check against the installed
      v1.0.30 bundle (a bogus PATCH returned thinking_level=null instead of the
      prior value). Fix: only assign when the value is a RECOGNISED level
      (`const tl = validThinkingLevel(...); if (tl !== undefined) patch.thinking_level = tl;`);
      unknown values are ignored, never coerced to NULL.
    chaos:
      runner: null
    observable_signal: |
      bun test packages/owl-agent-server/src/http/routes/__tests__/sessions-thinking.test.ts
      passes — specifically the case "PATCH with a bogus level is IGNORED": create a
      session with thinking_level "low", PATCH {thinking_level:"banana"}, and the
      returned/persisted thinking_level is still "low" (NOT null). null => the
      coerce-to-NULL regression is back.

  - id: BUG-2026-06-02-B
    title: tools:"none" owlbot received full coding set (no reach); all presets lacked reach collaboration escape hatch
    date: 2026-06-02
    surface: owlspace-owlbots
    source_files:
      - packages/owl-agent-server/src/runtime/runtime.ts
      - packages/owl-agent/src/index.ts
    user_visible_symptom: |
      Two bugs compounded:
      (1) An owlbot configured with tools:"none" was supposed to have NO base tools,
      but defaultToolFactory had no `none` branch so it fell through to `codingTools(ctx)`
      — a tools-restricted owlbot silently received the full coding set.
      (Note: the branch existed in some states of runtime.ts; the fix makes it
      explicit, tested, and always present.)
      (2) The `reach` collaboration tool (ALWAYS_ON_TOOLS = ["reach"]) was never
      appended to any owlbot's tool set — the factory had no append step at all —
      so owlbots could never use reach to message peers regardless of their policy.
    lint:
      - rule: DEFAULT_TOOL_FACTORY_MUST_APPEND_ALWAYS_ON_TOOLS
        presence: required
        path: packages/owl-agent-server/src/runtime/runtime.ts
        pattern: 'ALWAYS_ON_TOOLS\.filter\(.*have\.has'
        message: "defaultToolFactory must dedupe-append ALWAYS_ON_TOOLS after building the base set. Without this step, reach (and future always-on tools) are silently absent from every owlbot. Inverted-intent: this pattern MATCHING is the healthy state."
        file_types: [".ts"]
        exclude_files: ["__tests__/", ".test.ts"]
      - rule: DEFAULT_TOOL_FACTORY_MUST_HANDLE_NONE_EXPLICITLY
        presence: required
        path: packages/owl-agent-server/src/runtime/__tests__/reach-always-on.test.ts
        pattern: 'mk\("none"\)'
        message: "The tools:'none' case must stay covered: reach-always-on.test.ts must exercise defaultToolFactory(ctx, mk(\"none\")). The explicit none→[] source branch was refactored; this test is now the guard. Presence = healthy."
        file_types: [".ts"]
        exclude_files: ["__tests__/", ".test.ts"]
    chaos:
      runner: null   # The reach-always-on.test.ts suite IS the chaos harness:
                     # it exercises coding/readonly/none presets + explicit lists,
                     # the none-yields-exactly-reach case, the no-duplicate case,
                     # and the list-that-omits-reach case. 279 tests pass on the
                     # reach-tool branch; the six new tests fail on the pre-fix
                     # factory (verified: "Export named 'defaultToolFactory' not found"
                     # then all 6 assertions fail when exported without the append step).
      description: Covered by packages/owl-agent-server/src/runtime/__tests__/reach-always-on.test.ts (6 tests); none of the existing 273 tests asserted tools:"none" behavior, so the bug had zero test coverage before this fix.
    observable_signal: |
      bun test packages/owl-agent-server/src/runtime/__tests__/reach-always-on.test.ts
      must pass all 6 cases — specifically:
        "none yields exactly [reach]" — result is ["reach"], not a full coding set
        "includes reach for tools='coding'" — reach is in the coding preset
        "includes reach for tools='readonly'" — reach is in the readonly preset
        "does not duplicate reach if a list already names it" — dedup works
      Any failure means either the explicit-none branch or the ALWAYS_ON append was removed.
      Also: grep for `ALWAYS_ON_TOOLS` in packages/owl-agent/dist/index.js must return
      a non-empty hit — if missing, the export was dropped from the package public API
      and the runtime import will throw at startup.

  - id: BUG-2026-06-02-G
    title: enabled standalone systemd unit (kk-execution-memory-worker) dead since the nohup→systemd cutover, hidden behind a parity gate that only checked the klik@ tier
    date: 2026-06-02
    surface: klik-backend-deploy
    source_files:
      - deploy/scripts/klik-deploy-parity.sh
      - deploy/systemd/kk-execution-memory-worker.service
    user_visible_symptom: |
      Execution-memory extraction + grading silently stopped running after the
      2026-05-31 nohup→systemd migration (#842). The kk-execution-memory-worker
      unit was installed + enabled (WantedBy=multi-user.target) but never started,
      so it sat ActiveState=inactive/dead for ~the entire life of the systemd
      deploy (NRestarts=0, empty journal) — and would have surprise-started on the
      next reboot. It was NOT in klik.target (so `systemctl restart klik.target`
      never managed it) and NOT covered by klik-deploy-parity.sh, whose checks
      iterate only deploy/services/*.env (the 39 klik@ template instances). Net:
      a dead core worker coexisted with a green "PARITY OK" light for days.
    lint:
      - rule: PARITY_GATE_MUST_COVER_STANDALONE_TIER
        presence: required
        globs: ['**/klik-deploy-parity.sh']
        pattern: '\[5\] standalone'
        message: "klik-deploy-parity.sh must keep section [5] that health-asserts the standalone tier (klikmail, goal-scheduler, job-worker, logs, kk-execution-memory-worker) + timers. Without it the green light covers only the 39 klik@ instances and an enabled-but-dead standalone unit is invisible. Inverted-intent: this match IS the healthy state."
        file_types: [".sh"]
      - rule: EXECUTION_MEMORY_WORKER_MANAGED_BY_KLIK_TARGET
        presence: required
        globs: ['**/kk-execution-memory-worker.service']
        pattern: 'WantedBy=klik\.target'
        message: "kk-execution-memory-worker.service must be WantedBy=klik.target (not multi-user.target) so it is group-managed + cycled with the stack instead of resurrecting dead on reboot. Inverted-intent: this match IS the healthy state."
        file_types: [".service"]
    chaos:
      runner: null   # klik-deploy-parity.sh [5] IS the standing detector:
                     # `bash /opt/Klik/deploy/scripts/klik-deploy-parity.sh` HARD-fails
                     # if any standalone long-runner is not active, and klik-parity.timer
                     # runs it every 5 min. No separate chaos runner — the gate is the check.
      description: The narrow gate (klik@-only) is what let this hide; [5] closes it.
    observable_signal: |
      ssh gcp 'systemctl is-active kk-execution-memory-worker.service'            => active
      ssh gcp 'systemctl show kk-execution-memory-worker.service -p WantedBy --value' => klik.target
      ssh gcp 'bash /opt/Klik/deploy/scripts/klik-deploy-parity.sh'  => "PARITY OK" with a
        "[5] standalone tier: all long-runners active, timers armed" line. If [5] reports
        any unit as a non-active state, an enabled-but-dead standalone unit is back.

