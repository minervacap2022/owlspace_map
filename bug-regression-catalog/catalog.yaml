      recording/processing was broken — and ~38% of all sessions are status='failed' as a
      result. NOT caused by application code; a venv/dependency state from a botched deploy.
      Fix: remove torch + BOTH dist-infos, reinstall torch==2.8.0+cpu AND torchaudio==2.8.0+cpu
      (matching variants) from https://download.pytorch.org/whl/cpu, restart the 3 services.
      PERMANENT fix (PR #862): pin torch/torchaudio to a pytorch-cpu index in pyproject +
      regenerate the lock, so a fresh `uv sync` reproduces +cpu instead of pulling CUDA.
    lint:
      - rule: TORCH_PINNED_TO_CPU_INDEX
        presence: required
        path: pyproject.toml
        pattern: 'index = "pytorch-cpu"'
        message: "pyproject.toml must keep torch/torchaudio pinned to the pytorch-cpu index (the deploy host has no GPU). Drop it and `uv sync` resolves the PyPI CUDA build → libtorch_cuda.so missing → torch/speechbrain services crash-loop. Inverted-intent: this match IS the healthy state."
        file_types: [".toml"]
    chaos:
      runner: null   # venv-state guard, not a code path; the import check + parity gate ARE the detector.
      description: |
        Whenever torch is touched (any CPU/CUDA migration or uv sync), run the import
        check below + klik-deploy-parity. A mismatched torch/torchaudio variant or a
        dist-info collision reproduces the crash on the next service restart.
    observable_signal: |
      ssh gcp "/opt/Klik/.venv/bin/python -c 'import torch, torchaudio; from torch.nn import DataParallel; print(torch.__version__, torchaudio.__version__, torch.__file__ is not None)'"
      => prints matching versions (e.g. 2.8.0+cpu 2.8.0+cpu True). ImportError / OSError(libtorch_cuda.so)
      / torch.__file__=None => the breakage is back. Also: exactly ONE torch-*.dist-info under
      site-packages (two = the collision), and klik-deploy-parity => pipeline_api/streaming_api listening.

  - id: BUG-2026-06-02-C
    title: channel members panel showed a raw uuid for a co-member's PRIVATE owlbot (client resolved names from own+org agents only)
    date: 2026-06-02
    surface: backend
    source_files:
      - owl-backend/src/routes/channels.ts
      - owl-agent/apps/owlspace/src/renderer/pages/channels/MembersPanel.tsx
    user_visible_symptom: |
      In a shared channel, a member that was another co-member's PRIVATE owlbot
      (e.g. Mint in a reach: channel) rendered as a short uuid like "c3811e18…"
      instead of "Mint @mint", while org-visible owlbots (Default) rendered fine.
      Root cause: GET /v1/channels/:id/members returned raw {agent_id,user_id} and
      MembersPanel resolved names only from the viewer's OWN (/v1/agents?owner=me)
      + org-visible (?owner=org) agents — a private owlbot owned by someone else is
      in neither, so it fell back to shortId(uuid). Fix: the endpoint LEFT JOINs
      agents+users and returns agent_slug/agent_display_name + user_* per member;
      the panel prefers those. Co-members may see each other's names (no leak).
    lint:
      rule: CHANNEL_MEMBERS_RESOLVE_DISPLAY_NAMES
      presence: required
      pattern: 'agent_display_name'
      path: owl-backend/src/routes/channels.ts
      description: GET /v1/channels/:id/members must resolve display names server-side (LEFT JOIN agents/users → agent_slug/agent_display_name/user_*) so the client can render members it doesn't own. Match count must be >= 1.
    chaos:
      runner: null
    observable_signal: |
      GET /v1/channels/:id/members on a channel containing a private owlbot returns
      that member row with a non-null agent_slug + agent_display_name. Null name on a
      present agent_id => the raw-uuid regression is back.

  - id: BUG-2026-06-02-D
    title: owl-backend deploy aborted before restart — release prune ran as owlspace, can't rm CI(wilsonxu)-owned dirs
    date: 2026-06-02
    surface: backend
    source_files:
      - owl-backend/.github/workflows/deploy.yml
    user_visible_symptom: |
      A pushed owl-backend change "deployed" (CI red) but the running service kept
      serving OLD code. The deploy's atomic symlink swap succeeded, but post-deploy
      pruned old releases AS owlspace via `rm -rf`, and the CI-created release dirs
      are owned wilsonxu:owlspace mode drwxr-sr-x (group not writable) → "Permission
      denied". Under `set -euo pipefail` that aborted the remote script BEFORE
      `systemctl restart owl-backend`, so swapped-in code never loaded (needed a
      manual restart). Triggered the first time a 6th release existed (nothing to
      prune before). Fix: prune in the wilsonxu ssh step (owns the dirs), run
      migrate inline; stop using the VM post-deploy script.
    lint:
      rule: DEPLOY_PRUNES_RELEASES_AS_SSH_USER
      presence: required
      pattern: 'Prune old releases AS wilsonxu'
      path: owl-backend/.github/workflows/deploy.yml
      description: deploy.yml must prune releases as the ssh user (wilsonxu, who owns them), not via owlspace — else rm fails and aborts before the restart. Keep prune BEFORE the systemctl restart in the same ssh step. Match count must be >= 1.
    chaos:
      runner: null
    observable_signal: |
      After a push to owl-backend main, `gh run list --branch main` shows the deploy
      run conclusion=success, and the live API reflects the new code without a manual
      `systemctl restart owl-backend`. A red deploy whose log shows "rm: cannot remove
      .../releases/...: Permission denied" => the regression is back.

  - id: BUG-2026-06-02-J
    title: StartLimitIntervalSec/StartLimitBurst were in [Service] of klik@.service — systemd ignores them there, disabling the crash-loop rate-limit (the torch loop churned to NRestarts=80 unbounded)
    date: 2026-06-02
    surface: klik-backend-deploy
    source_files:
      - deploy/systemd/klik@.service
    user_visible_symptom: |
      systemd start-rate-limit directives (StartLimitIntervalSec, StartLimitBurst)
      belong in [Unit], but the klik@.service template had them in [Service], where
      systemd IGNORES them ("Unknown key name 'StartLimitIntervalSec' in section
      'Service', ignoring" on every action). The rate limit therefore never applied:
      a crash-looping service restarted UNBOUNDED instead of being marked failed
      after N fast failures — the torch crash-loop (BUG-2026-06-02-I) churned to
      NRestarts=80. Fixed in PR #864 by moving both directives to [Unit].
    lint:
      - rule: STARTLIMIT_NOT_IN_SERVICE_SECTION
        presence: forbidden
        pattern: '\[Service\][^\[]*StartLimit(IntervalSec|Burst)'
        message: "StartLimitIntervalSec/StartLimitBurst inside a unit's [Service] section are silently ignored by systemd ('Unknown key name') — they belong in [Unit], else the crash-loop rate-limit is OFF (klik@.service let the torch loop hit NRestarts=80). A MATCH here IS the bug — move them to [Unit]."
        file_types: [".service"]
    chaos:
      runner: null   # static config guard; the lint + absence of 'Unknown key name' warnings on daemon-reload are the detector.
      description: A misplaced StartLimit re-disables the rate-limit; the lint catches it at change-time.
    observable_signal: |
      ssh gcp "systemctl show klik@auth_api -p StartLimitIntervalUSec" => 1min (NOT the
      default 10s = the directive ignored). And after a daemon-reload,
      `sudo journalctl --since '1 min ago' | grep -c "Unknown key name 'StartLimit"` => 0.
      A non-zero warning count or StartLimitIntervalUSec back at the default => it moved to [Service] again.

  - id: BUG-2026-06-02-K
    title: channels couldn't be renamed (no endpoint) or deleted by their non-admin creator (DELETE was admin-only); no sidebar affordance
    date: 2026-06-02
    surface: backend
    source_files:
      - owl-backend/src/routes/channels.ts
      - owl-agent/apps/owlspace/src/renderer/components/app-shell/AppShell.tsx
      - owl-agent/apps/owlspace/src/renderer/components/app-shell/SidebarMenu.tsx
    user_visible_symptom: |
      Users could create channels (any member) but could not delete them — DELETE
      /v1/channels/:id was requireAdmin, so a non-admin who created a channel got
      403 — and there was no rename endpoint at all, nor any right-click affordance
      in the sidebar. Fix: PATCH /v1/channels/:id { name } (rename) + DELETE relaxed
      to creator-OR-admin (built-ins still protected, cross-company still 404); the
      sidebar grew a "channel" SidebarMenu type with Rename (RenameDialog) / Delete
      (confirm) on standard channels only.
    lint:
      rule: CHANNEL_DELETE_ALLOWS_CREATOR_OR_ADMIN
      presence: required
      pattern: "Only the channel creator or an admin can delete it"
      path: owl-backend/src/routes/channels.ts
      description: DELETE /v1/channels/:id must allow the creator OR an admin (not requireAdmin), and a rename PATCH must exist — both with the creator-or-admin guard + built-in protection. Match count must be >= 1.
    chaos:
      runner: null
    observable_signal: |
      As a NON-admin company member (mint a token via issueUserToken on the VM),
      create a channel, then `PATCH /v1/channels/:id {"name":"x"}` returns 200 with
      the new name AND `DELETE /v1/channels/:id` returns 200 {"deleted":true}. A 403
      on either (for the creator) => the admin-only regression is back. Built-in
      channels (kind != 'standard') must still return 403 on both.

  - id: BUG-2026-06-02-9c936c
    title: owlbot cwdStrategy "fixed" had no path input — silently fell back to defaultCwd
    date: 2026-06-02
    surface: frontend
    source_files:
      - owl-agent/apps/owlspace/src/renderer/pages/OwlbotsPage.tsx
      - owl-agent/packages/owl-agent-server/src/http/routes/agents.ts
    user_visible_symptom: |
      The Owlbots editor's "Cwd strategy" select offered "fixed", but there was NO
      field to enter the path — so fixedCwd was never set and the runtime's
      allocateCwd() fell back to defaultCwd (registry: `agent.config.fixedCwd || this.defaultCwd`).
      The config field existed end-to-end (AgentConfig.fixedCwd, allocateCwd) but
      the UI never exposed it AND the /api/agents serializer omitted it (so it
      couldn't even load a previously-set value). Fix: add a conditional path Input
      (shown when cwdStrategy === "fixed") + add fixedCwd to the AgentInfo type, the
      edit draft, and the serializer so it round-trips. Local owlbots only — cloud
      owls force "sandbox".
    lint:
      rule: AGENTS_SERIALIZER_INCLUDES_FIXEDCWD
      presence: required
      pattern: "fixedCwd"
      path: packages/owl-agent-server/src/http/routes/agents.ts
      description: The /api/agents serializer must include fixedCwd, or the Owlbots "fixed" cwd input can't load a saved path. Match count must be >= 1.
    chaos:
      runner: null
    observable_signal: |
      In the Owlbots editor, pick Cwd strategy = "fixed" → a path input appears;
      enter "/tmp/x", save, reopen → the input still shows "/tmp/x" (round-trips via
      serializer→draft→input). GET /api/agents returns fixedCwd for that agent. No
      input shown, or fixedCwd absent from /api/agents => the regression is back.

  - id: BUG-2026-06-02-a79689
    title: invited channel owlbots stayed silent — AddOwlbotPicker hardcoded always_on=false (mention-only)
    date: 2026-06-02
    surface: frontend
    source_files:
      - owl-agent/apps/owlspace/src/renderer/pages/channels/AddOwlbotPicker.tsx
      - owl-agent/apps/owlspace/src/renderer/lib/owl-backend.ts
    user_visible_symptom: |
      A user created a channel, invited owlbots (e.g. Sage, Default), typed plain
      messages, and got ZERO replies. The bots WERE connected and saw the messages
      (bot-pool: "msg ... content=Hiii") but logged decision=false, because
      always_on=false and there was no @-mention: the pool's decision function
      returns ctx.alwaysOn when no mention is present (bot-pool.ts). Root cause:
      AddOwlbotPicker.tsx invited with always_on=false (hardcoded), and the lib
      default was also false — overriding the backend's intended default
      (always_on true, "respond to every message, matching DM behavior"). Fix:
      default the picker + owlBackend.channels.addOwlbot to always_on=true.
    lint:
      rule: ADDOWLBOT_INVITES_ALWAYS_ON
      presence: required
      pattern: 'addOwlbot.channel.id, backendUuid, true.'
      path: apps/owlspace/src/renderer/pages/channels/AddOwlbotPicker.tsx
      description: AddOwlbotPicker must invite owlbots with always_on=true so they reply to every message, not only @-mentions. Match count must be >= 1.
    chaos:
      runner: null
    observable_signal: |
      Invite an owlbot to a channel, post a plain (no @mention) message → the
      owlbot replies. channel_members.always_on = true for that (channel, agent).
      decision=false in the bot-pool log for a non-mention human message => the
      mention-only regression is back.

  - id: BUG-2026-06-03-6f9f53
    title: Klik auth 403 landmine — age_confirmed_over_13 / accept_biometric_consent dropped from the /register wire by encodeDefaults=false (both client forks)
    date: 2026-06-03
    surface: frontend
    source_files:
      - Klik_one/liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/data/repository/BackendAuthApi.kt
      - Klik_newandroid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/data/repository/BackendAuthApi.kt
      - Klik_one/liquid/samples/composeApp/src/commonTest/kotlin/io/github/fletchmckee/liquid/samples/app/data/repository/BackendAuthApiContractTest.kt
    user_visible_symptom: |
      A user who accepted the onboarding consent screens still gets a 403 on their
      first authenticated request — "You must confirm you are 13 years of age or
      older" (or the BIPA voiceprint-consent 403 at the KK_voiceprint stage). Root
      cause: BackendRegisterRequest's age_confirmed_over_13 / accept_biometric_consent
      are sent =true, but if either field is given a Kotlin default value, the app's
      Json { encodeDefaults = false } DROPS same-as-default values from the body, so
      the required field silently never reaches KK_auth -> server applies its false
      default -> 403. (Klik#848.)
    lint:
      rule: REGISTER_AGE_CONSENT_ASSERTED_ON_WIRE
      pattern: 'age_confirmed_over_13..:true'
      path: Klik_one/liquid/samples/composeApp/src/commonTest/kotlin/io/github/fletchmckee/liquid/samples/app/data/repository/BackendAuthApiContractTest.kt
      presence: required
      message: The wire-contract test must assert age_confirmed_over_13 stays =true on the /register body (driven through the real encodeDefaults=false Json). Its ABSENCE means the 403 must-confirm-13 landmine is unguarded. The two dots absorb Kotlin's escaped quote. Companion static check lives in scripts/k1-guards.sh (age_confirmed_over_13 must have no default).
    chaos:
      runner: null
    observable_signal: |
      Run BackendAuthApiContractTest.register_carries_age_and_biometric_consent_on_the_wire
      on either client fork (iosSimulatorArm64Test on Klik_one, testDebugUnitTest on
      Klik_newandroid): the captured /register body must contain
      "age_confirmed_over_13":true AND "accept_biometric_consent":true. If a request
      DTO field gains a default value, encodeDefaults=false drops it and this assertion
      fails => the 403 landmine is back.

  - id: BUG-2026-06-03-63b3f1
    title: sector_map py_stem resolver dropped dotted PACKAGE imports to a soft reference => empty (lying) blast radius on real Python repos
    date: 2026-06-03
    surface: tooling-ci
    source_files:
      - sector_map/extract.py
      - sector_map/test_cli.py
    user_visible_symptom: |
      Running the sector map on a normal Python PACKAGE repo (dotted imports like
      `from core.m import helper`) reported NO depends_on edges and an empty blast
      radius — a false "nothing depends on this sector". An agent driving a pre-edit
      check would believe a foundational change was safe when consumers actually
      depend on it. Root cause: the py_stem import resolver did
      `stem_map.get(p.split("/")[0])`, which matches only FLAT bare-module imports
      (`import foo`); a package prefix like `core` is a directory, never a file stem,
      so dotted imports fell through to a soft `references` edge instead of a hard
      `depends_on`. The owlspace_map self-map uses flat bare-module imports, so it
      masked the gap until a packaged-import test surfaced it.
    lint:
      rule: NO_PY_STEM_FIRST_COMPONENT_ONLY
      pattern: 'stem_map\.get\(p\.split\("/"\)\[0\]\)'
      path: sector_map/extract.py
      presence: forbidden
      message: sector_map py_stem must resolve dotted PACKAGE imports (flat stem, then package-root, then trailing stem), not collapse to the first-component-only lookup; a match means packaged Python repos get empty (lying) blast radii again.
    chaos:
      runner: null
    observable_signal: |
      python3 sector_map/test_cli.py — ConsumersRiskFirst.test_uncovered_consumer_is_surfaced_and_ordered_first
      builds a 2-sector Python PACKAGE repo (api imports `from core.m import helper`)
      and asserts `api` is in core's blast_radius. If the resolver regresses to
      flat-only, api->core becomes a soft "references" edge, core's blast_radius is
      empty, and the assertion fails. Equivalently: build_graph on any dotted-import
      Python repo must emit kind "depends_on" (not "references") for a cross-sector
      import.

  - id: BUG-2026-06-03-461e97
    title: catalog lint with a pattern but wrong key-shape routes to NO enforcement path — a lying guard (15 pre-existing found); add loader invariant + chaos ratchet
    date: 2026-06-03
    surface: tooling-ci
    source_files:
      - bug-regression-catalog/scripts/load_catalog.py
      - bug-regression-catalog/scripts/test_load_catalog.py
      - bug-regression-catalog/scripts/chaos/catalog_no_lying_guards.sh
    user_visible_symptom: |
      A catalog entry whose `lint` carries a `pattern` but the wrong key shape is
      silently enforced NOWHERE — it LOOKS like a regression guard but provides zero
      coverage. lint_patterns() (the forbidden path) needs rule+pattern+message;
      required_guards() loads ONLY entries with an explicit `presence: required` and
      never infers. So a lint with {pattern, path, description} and no rule (exactly
      the 403 entry BUG-2026-06-03-6f9f53 before its fix), OR a MUST_/HAS_ rule that
      omits `presence: required`, routes to neither. The new invariant found 15 such
      pre-existing lying guards across backend/firmware/owlspace entries.
    chaos:
      runner: chaos/catalog_no_lying_guards.sh
      description: Runs the loader invariant test_every_pattern_bearing_lint_is_actually_enforced; fails if any catalog lint with a pattern routes to neither enforcement path beyond the tracked KNOWN_UNENFORCED baseline (which may only shrink).
    observable_signal: |
      python3 bug-regression-catalog/scripts/test_load_catalog.py
      CatalogLoaderInvariants.test_every_pattern_bearing_lint_is_actually_enforced
      A NEW lint-with-pattern that routes nowhere — or a baselined id in
      KNOWN_UNENFORCED that has since been fixed/removed (staleness) — turns the
      loader suite red. chaos/catalog_no_lying_guards.sh wraps the same check for
      /full-stack-test phase 21.
