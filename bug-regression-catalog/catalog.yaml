- id: BUG-2026-07-11-e2463c
  title: iOS BLE same-peripheral retry could inherit stale callbacks and accept an invalid frame contract
  date: '2026-07-11'
  surface: ios
  source_files:
  - Klik_one/app/src/iosMain/kotlin/ai/hiklik/klik/data/klik/KlikBleTransport.ios.kt
  - Klik_one/app/src/commonMain/kotlin/ai/hiklik/klik/data/klik/KlikBleSpec.kt
  - Klik_one/app/src/commonMain/kotlin/ai/hiklik/klik/data/klik/KlikPacket.kt
  - Klik_one/app/src/iosTest/kotlin/ai/hiklik/klik/data/klik/IosBleFailureLifecycleTest.kt
  user_visible_symptom: |
    After handshake attempt A failed, delayed CoreBluetooth callbacks for the same
    CBPeripheral could be routed into replacement attempt B. B could be disconnected
    or left in PAIR, while healthy 244-byte iOS write capacity was mislabeled as a
    low MTU and DTP notifications with trailing bytes were silently accepted.
  observable_signal: |
    IosBleFailureLifecycleTest must prove B cannot start on the same peripheral until
    A's didDisconnect consumes callback ownership, and didFailToConnect must permit an
    immediate retry because no physical link exists. KlikPacketTest must reject a
    valid frame plus trailing bytes, and KlikClientImplTest must accept 191 writable
    payload bytes while warning at 190.
  lint:
  - rule: IOS_BLE_RECONNECT_WAITS_FOR_DISCONNECT
    pattern: 'retired\.any \{ it\.peripheral == attempt\.peripheral \}'
    presence: required
    path: app/src/iosMain/kotlin/ai/hiklik/klik/data/klik/KlikBleTransport.ios.kt
    message: Same-peripheral BLE replacement must remain deferred while a retired physical attempt still owns callbacks.
  - rule: DTP_DECODER_REJECTS_TRAILING_BYTES
    pattern: 'frame\.size > expectedFrameSize'
    presence: required
    path: app/src/commonMain/kotlin/ai/hiklik/klik/data/klik/KlikPacket.kt
    message: One notification is one complete DTP frame; trailing bytes must be rejected.
  - rule: BLE_COMPLETE_FRAME_CAPACITY_REQUIRED
    pattern: 'REQUIRED_DTP_FRAME_BYTES: Int = MAX_DTP_PAYLOAD_BYTES \+ HEADER_BYTES \+ CRC_BYTES'
    presence: required
    path: app/src/commonMain/kotlin/ai/hiklik/klik/data/klik/KlikBleSpec.kt
    message: BLE readiness diagnostics must use the canonical 191-byte complete DTP frame capacity.
  chaos:
    runner: null
