  - id: BUG-2026-06-01-I
    title: OTA UI swallowed CancellationException + ran the push in a composition scope
    date: 2026-06-01
    surface: frontend
    source_files:
      - Klik_one/liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/ui/klikone/KlikDevicePanel.kt
      - Klik_one/liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/data/klik/KlikOtaCoordinator.kt
    user_visible_symptom: |
      Surfaced by the first successful on-device OTA. Two defects in KlikOtaSection:
      (1) its LaunchedEffect OTA-check did `catch (t: Throwable)` which caught the
      normal LeftCompositionCancellationException when the device panel left
      composition — logging a scary [ERROR]+stacktrace and then calling
      evaluate(info, null) which could RESET the coordinator state mid-flow.
      (2) The OTA push ran in rememberCoroutineScope() (composition-scoped), so
      navigating away from the panel during the multi-minute BLE transfer would
      ABORT the OTA. Fix: rethrow CancellationException (log only real failures), and
      move fetch+push into KlikOtaCoordinator.startUpdate() on an APP-scoped coroutine
      so the transfer survives the UI lifetime; UI fires-and-forgets + observes state.
    chaos:
