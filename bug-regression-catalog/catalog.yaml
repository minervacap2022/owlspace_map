# ============================================================================
# BUG REGRESSION CATALOG — single source of truth
# ============================================================================
# Every production bug we have shipped lives here. Each entry generates:
#   1. A regex rule loaded by validate_production_rules.py
#   2. A chaos-phase runner loaded by full-stack-test/klik-ios-e2e-test
#   3. A row in the SessionEnd-hook reminder when bug-fix commits land
#
# Adding a bug:
#   - Pick a fresh ID: BUG-YYYY-MM-DD-{A,B,C…}
#   - Fill all required fields (validator + chaos-phase scripts both
#     refuse to load entries with missing fields — that's intentional)
#   - Add a chaos runner under scripts/chaos/<id>.sh if applicable.
#     If the bug is purely static (e.g. an unused fallback string), set
#     chaos.runner: null.
#
# lint: a LIST of mappings (one per pattern). Each mapping:
#     rule:          UNIQUE rule name (UPPER_SNAKE).
#     pattern:       regex.
#     message:       what to tell the committer.
#     presence:      forbidden (default) = a match IS the bug;
#                    required = the pattern MUST be present — its ABSENCE is the bug.
#     globs:         OPTIONAL path globs ('**/X', 'dir/File.kt') scoping the lint to
#                    specific file(s). REQUIRED for presence:required guards, and the
#                    way to scope a forbidden pattern that is only bad in one file.
#     file_types:    OPTIONAL ['.py','.kt'] suffix filter for broad (un-globbed) lints.
#     exclude_files: OPTIONAL path substrings to skip.
#   Do NOT invent other lint shapes (no bare `path`/`description` dialect) — the loader
#   (scripts/load_catalog.py) consumes ONLY these keys; an off-schema entry is NOT
#   enforced (reported on stderr, never silently dropped).
#
# Removing a bug entry requires a matching note explaining what
# observability/test replaced it. Silence is how we re-debug the same
# shape twice.
# ============================================================================

bugs:
  - id: BUG-2026-05-28-A
    title: ASR retry classifier matched only one Volcengine error code
    date: 2026-05-28
    surface: backend
    source_files:
      - /opt/Klik/KK_asr/core/volcengine_transcriber.py
    user_visible_symptom: |
      Recording failed silently when Volcengine returned 45000006
      (Invalid audio URI) instead of 55001010 (timeout). User saw the
      session as a generic "Meeting on <date>" row with no retry.
    lint:
      - rule: NO_SINGLE_CODE_RETRY_CLASSIFIER
        pattern: '_TIMEOUT_STATUS\s*=\s*["\'']\d{5,}["\'']'
        message: 'single-code retry classifier — vendor errors come in families, use a tuple of codes'
        file_types: [".py"]
        exclude_files: ["test/", "_test.py", "tests/"]
      - rule: NO_SINGLE_CODE_RETRY_CLASSIFIER
        pattern: '_RETRY_STATUS\s*=\s*["\'']\d{5,}["\'']'
        message: 'single-code retry classifier — use a tuple of codes'
        file_types: [".py"]
        exclude_files: ["test/", "_test.py", "tests/"]
    chaos:
      runner: chaos/asr_45000006.sh
      description: Mock Volcengine to return 45000006 once; assert pipeline retries and completes.
    observable_signal: |
      grep 'volcengine_audio_fetch_failure_retry' /opt/Klik/logs/KK_asr.log
      → if the count is rising in production, retry IS working
      → if you see pipeline_failed with status=45000006 and NO matching
        retry log, the classifier regressed

  - id: BUG-2026-05-28-B
    title: Orchestrator asyncio.create_task retry from sync threadpool
    date: 2026-05-28
    surface: backend
    source_files:
      - /opt/Klik/KK_orchestrator/orchestrator_api.py
    user_visible_symptom: |
      ASR-failed sessions were supposed to auto-retry with backoff but
      NEVER did. RuntimeError "no running event loop" caught by
      `except Exception: logger.warning(retry_schedule_failed)` so the
      dead retry was invisible.
    lint:
      - rule: NO_SILENT_RETRY_SCHEDULE_FAILURE
        pattern: 'logger\.warning\([^)]*retry_schedule_failed'
        message: 'retry scheduling failure must be logger.error (and paged); warning gets ignored'
        file_types: [".py"]
        exclude_files: ["test/", "_test.py"]
      - rule: NO_SILENT_RETRY_SCHEDULE_FAILURE
        pattern: 'logger\.warning\([^)]*pipeline_.*_retry.*failed'
        message: 'pipeline retry failure must be logger.error, warning hides the dead retry'
        file_types: [".py"]
        exclude_files: ["test/", "_test.py"]
      - rule: NO_SILENT_RETRY_SCHEDULE_FAILURE
        pattern: 'logger\.warning\([^)]*retry_failed'
        message: 'retry failure must be logger.error so monitoring sees it'
        file_types: [".py"]
        exclude_files: ["test/", "_test.py"]
    chaos:
      runner: chaos/retry_schedule_fires.sh
      description: Force ASR to fail once; assert the retry actually fires within backoff window.
    observable_signal: |
      pipeline_asr_auto_retry_scheduled event followed by a successful
      pipeline_completed for the same session_id. If the warning shows
      up alone the retry was scheduled but never ran.

  - id: BUG-2026-05-28-C
