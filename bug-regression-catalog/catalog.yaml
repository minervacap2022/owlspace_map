  user_visible_symptom: 'The mobile client''s LogEntry serialized to FLAT DOTTED keys ("log.level":"INFO",

    "log.logger", "error.message"/"error.type"/"error.stack_trace", "user.id") with UPPERCASE

    levels and NO `service` block — instead of the canonical NESTED ECS the kk-logger

    schema.json defines (log:{level(lowercase),logger}, service:{name,version,node},

