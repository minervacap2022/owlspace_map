      by "Recording stop" and "STATE SAVE → OTA". OTA then completes and reboots
      into the new version (App version + partition offset change).

  - id: BUG-2026-06-01-E
    title: iOS/Android app did not auto-reconnect a paired Klik in SAVE mode (scan-gated reconnect)
    date: 2026-06-01
    surface: frontend
    source_files:
      - Klik_one/liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/data/klik/KlikDeviceStateRepository.kt
    user_visible_symptom: |
      A previously-paired device that is powered on and advertising in the always-on
      SAVE/READY power mode was not auto-reconnected by the app — the UI sat on
      "offline". KlikDeviceStateRepository.tryAutoReconnect() gated reconnect on a
      service-UUID-filtered scan (client.scan().first{...}); the new power model
      trims the advertisement (no FFE0 service UUID / "Klik-" local name in low-power
      adv), so iOS scanForPeripheralsWithServices never surfaced it and the reconnect
      silently timed out via withTimeoutOrNull. App-side counterpart of firmware
      BUG-2026-06-01-C. Fix: connect DIRECTLY to the known device (iOS
      retrievePeripheralsWithIdentifiers + connectPeripheral, no timeout,
      advertising-independent; Android getRemoteDevice + connectGatt). Scan is now
      only a fallback when the OS cannot resolve the id (e.g. reinstall).
    lint:
      # The OLD scan-first reconnect logged this exact string. Its reappearance means
      # someone re-gated auto-reconnect on a scan — the regression is back.
      rule: NO_SCAN_GATED_AUTO_RECONNECT
      presence: forbidden
      pattern: 'auto-reconnect scanning for'
      message: "The old scan-gated auto-reconnect logged this exact string; its reappearance in KlikDeviceStateRepository means reconnect was re-gated on a BLE scan — the SAVE-mode regression is back. A MATCH here IS the bug."
      globs:
        - "**/data/klik/KlikDeviceStateRepository.kt"
    chaos:
      runner: 'cd Klik_one/liquid && ./gradlew :samples:composeApp:iosSimulatorArm64Test --tests "*KlikDeviceStateRepositoryReconnectTest*"'
      description: A known-but-dropped device must be reconnected via a direct connect() (scanCalls==0); scan is used only when the direct connect never reaches Connected.
    observable_signal: |
      iOS/Android log on reconnect must read "auto-reconnect connecting to known
      id=..." (direct connect). The old "auto-reconnect scanning for id=..." must NOT
      appear. On hardware: a paired device left in SAVE mode reconnects without a
      manual nudge.

  - id: BUG-2026-06-01-F
    title: OTA acks/errs were decoded then dropped — OTA was undriveable from the app
    date: 2026-06-01
    surface: frontend
    source_files:
      - Klik_one/liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/data/klik/KlikDeviceStateRepository.kt
      - Klik_one/liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/data/klik/KlikOtaDriver.kt
    user_visible_symptom: |
      Firmware OTA over FFE4 works (firmware note C), but the app could not drive it:
      KlikEventDecoder produced KlikEvent.OtaAck/OtaErr, yet KlikDeviceStateRepository.
      reduce() let them fall into the catch-all `else` branch and dropped them, so no
      consumer could ever observe an ACK — the stop-and-wait OTA loop had nothing to
      wait on. Fix: surface OtaAck/OtaErr on a new otaEvents flow and add KlikOtaDriver
      (BEGIN -> per-chunk CHUNK/ACK with retry + first-chunk partition-erase timeout
      + OTA_ERR abort + battery gate), mirroring tools/ota_push.py.
    chaos:
      runner: 'cd Klik_one/liquid && ./gradlew :samples:composeApp:iosSimulatorArm64Test --tests "*KlikOtaDriverTest*"'
      description: Drive a full image through a fake OtaChannel; assert framing, per-chunk ACK flow-control, retry-on-dropped-ACK, OTA_ERR abort, battery gate, and reboot-on-END handling.
    observable_signal: |
      KlikOtaDriver.pushFirmware returns OtaResult.Succeeded(deviceConfirmed=true) on
      the happy path; on hardware the FFE1 log shows OTA_ACK seq advancing 0..N then a
      version bump. Regression tripwire: KlikDeviceStateRepository.otaEvents emits
      nothing while an OTA is in flight.

  - id: BUG-2026-06-01-G
    title: Highlight marks double-POSTed on reconnect (no replay de-dup)
    date: 2026-06-01
    surface: frontend
    source_files:
      - Klik_one/liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/platform/KlikHighlightUploader.kt
      - Klik_one/liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/data/klik/HighlightDeduper.kt
    user_visible_symptom: |
      On reconnect the firmware replays each highlight mark's ±2min window AND
      re-sends marks during linear backfill (firmware note G). KlikHighlightUploader
      POSTed every Highlight event with no de-dup, so a single user double-click
      landed on the backend multiple times — the user's highlight count inflated on
