  - rule: QUALIFIED_PROVIDER_NEVER_FALLS_BACK_TO_DEFAULT
    pattern: 'falling back to default'
    presence: forbidden
    path: packages/owl-agent-server/src/storage/providers.ts
    message: An explicitly qualified provider id must fail closed when missing; silently using the host or local default can send traffic to stale organization infrastructure.
  - rule: CLOUD_HOST_MATERIALIZES_SCOPED_ORG_PROVIDERS
    pattern: 'runtime\.providers\.replaceOrgProviders\(scopedOrganizationProviders\(bots\)\)'
    presence: required
    path: packages/owl-agent-server/src/cloud-host.ts
    message: Every cloud reconcile must replace the effective provider layer from company-scoped organization connections before writing Owlbot sidecars.
  - rule: BACKEND_SUBSCRIBES_ORGANIZATION_CONNECTION_EVENTS
    pattern: '"org-llm-connections"'
    presence: required
    path: packages/owl-agent-server/src/backend-sync.ts
    message: Local runtimes must subscribe to organization connection changes instead of refreshing only when the AI screen is opened.
  chaos:
    runner: null
- id: BUG-2026-07-16-f77ee6
  title: Session model selection was overridden by stale Codex resume state and provider environment
  date: '2026-07-16'
  surface: frontend
  source_files:
  - Owl/Sources/App/macOS/Owl/Daemon/Owld.swift
  - Owl/Sources/App/macOS/Owl/Stores/ProviderStore.swift
  - Owl/Sources/App/macOS/Owl/Stores/SessionStore.swift
  - Owl/Tests/OwldHelpersTests.swift
  - Owl/Tests/ProviderStoreTests.swift
  - Owl/Tests/SessionStoreTests.swift
  user_visible_symptom: |
    Selecting the Wilson provider for a session advertised claude-failover, but
    Codex could resume with mujica_naiba_wilson or gpt-5.6-sol high from saved
    rollout state. Claude Code could also retain ANTHROPIC_MODEL after switching
    providers, while session overrides containing an old gateway URL were lost.
  observable_signal: |
    OwldHelpersTests requires both fresh and resumed Codex launches to pass the
    selected model and canonical effort explicitly. ProviderStoreTests requires
    official mode to unset ANTHROPIC_MODEL, and SessionStoreTests requires a
    legacy Wilson provider id to migrate to the current endpoint and env body.
  lint:
  - rule: CODEX_SESSION_LAUNCH_BINDS_SELECTED_MODEL
    pattern: '--model \\"\$\{ANTHROPIC_MODEL:-gpt-5\.5\}\\"'
    presence: required
    path: Owl/Sources/App/macOS/Owl/Daemon/Owld.swift
    message: Fresh and resumed Codex launches must explicitly bind the provider-selected model so persisted rollout state cannot override the session picker.
  - rule: OFFICIAL_PROVIDER_CLEARS_STALE_MODEL_ALIAS
    pattern: 'unset ANTHROPIC_MODEL'
    presence: required
    path: Owl/Sources/App/macOS/Owl/Stores/ProviderStore.swift
    message: Official provider mode must clear the prior built-in model alias before launching Claude Code.
  chaos:
    runner: null
- id: BUG-2026-07-23-158ea0
  title: Session mode changes could not recover a missing tmux pane
  date: '2026-07-23'
  surface: frontend
  source_files:
  - Owl/Sources/App/macOS/Owl/Daemon/Owld.swift
  - Owl/Sources/App/macOS/Owl/OwlAppDelegate.swift
  - Owl/Sources/App/macOS/Owl/TmuxControl/Tmux.swift
  - Owl/Tests/TmuxTests.swift
  user_visible_symptom: |
    Switching a Codex session from Standard to Fast could leave its terminal
    tile permanently loading. Switching back to Standard and clicking Reload
    did not recover. The Fast argument assignment split the generated outer
    bash invocation into multiple arguments, killing the pane script, while
    respawn-pane errors were then silently discarded after the tmux session
    disappeared.
  observable_signal: |
    OwldHelpersTests requires the generated pane command to pass one complete
    script argument to inner bash. TmuxTests requires a missing-session respawn
    to throw, requires the shared restart operation to recreate a missing
    session, and requires an existing session to be respawned in place. Reload
    and per-session provider, thinking, and Fast controls use that recovery.
  lint:
  - rule: TMUX_RESPAWN_MUST_NOT_SWALLOW_FAILURE
    pattern: 'try\? runRaw\(\["respawn-pane"'
    presence: forbidden
    path: Owl/Sources/App/macOS/Owl/TmuxControl/Tmux.swift
    message: respawn-pane failures must surface so a missing session can be recreated instead of leaving the tile permanently loading.
  - rule: CODEX_FAST_ARGS_MUST_NOT_SPLIT_OUTER_BASH
    pattern: "_OWL_CODEX_FAST_ARGS='"
    presence: forbidden
    path: Owl/Sources/App/macOS/Owl/Daemon/Owld.swift
    message: The pane command is already single-quoted for outer bash; nested single quotes split the inner script into multiple bash -c arguments.
  chaos:
    runner: null
