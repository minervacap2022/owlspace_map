  - id: BUG-2026-06-02-F
    title: only the Stoat server-owner could create channels / invite members — every other company member got 403 (owl-backend)
    date: 2026-06-02
    surface: backend
    source_files:
      - owl-backend/src/routes/channels.ts
      - owl-backend/src/stoat/builtin_channels.ts
    user_visible_symptom: |
      In OwlSpace, "New Channel" failed with
      {"error":"stoat_failed","status":403,"body":{"type":"MissingPermission","permission":"ManageChannel"}}
      for any company member who was not the one Stoat-server owner (it worked only
      for that single owner account). Inviting owlbots hit the same 403 (ManageServer);
      inviting humans silently never joined them to Stoat (DB row only). Root cause:
      a company's Stoat server is owned by ONE account, Stoat lets only the owner
      create channels / manage members, but the user-facing /v1/channels routes
      performed the Stoat op AS THE CALLER. Fix: delegate every mutation through
      serverOwnerToken(companyId) + ensureHumanInStoatServer (the pattern built-in
      channels already use); drop the admin-only gate on create; accept any VIEWABLE
      owlbot (own OR org-visible), not just the caller's own.
    lint:
      rule: CHANNELS_USE_SERVER_OWNER_TOKEN
      presence: required
      pattern: 'serverOwnerToken'
      path: owl-backend/src/routes/channels.ts
      description: The user-facing channel routes must create/invite via serverOwnerToken (owner delegation), NOT the caller's Stoat token — only the Stoat server owner holds ManageChannel/ManageServer. Match count must be >= 1.
    chaos:
      runner: null
    observable_signal: |
      As a NON-owner company member (mint a token via issueUserToken on the VM):
      `POST /v1/channels {"name":"x"}` returns 201 (not 403), and
      `POST /v1/channels/:id/members/owlbot` with an org-visible agent returns 201.
      A 403 MissingPermission(ManageChannel|ManageServer) => the caller-token regression is back.

  - id: BUG-2026-06-02-E
