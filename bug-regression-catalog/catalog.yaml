bugs:
- id: BUG-2026-05-28-A
  title: ASR retry classifier matched only one Volcengine error code
  date: 2026-05-28
  surface: backend
  source_files:
  - /opt/Klik/KK_asr/core/volcengine_transcriber.py
  user_visible_symptom: 'Recording failed silently when Volcengine returned 45000006

    (Invalid audio URI) instead of 55001010 (timeout). User saw the

    session as a generic "Meeting on <date>" row with no retry.

    '
  lint:
  - rule: NO_SINGLE_CODE_RETRY_CLASSIFIER
    pattern: _TIMEOUT_STATUS\s*=\s*["\']\d{5,}["\']
    message: single-code retry classifier — vendor errors come in families, use a tuple of codes
    file_types:
    - .py
    exclude_files:
    - test/
    - _test.py
    - tests/
  - rule: NO_SINGLE_CODE_RETRY_CLASSIFIER
    pattern: _RETRY_STATUS\s*=\s*["\']\d{5,}["\']
    message: single-code retry classifier — use a tuple of codes
    file_types:
    - .py
    exclude_files:
    - test/
    - _test.py
    - tests/
  chaos:
    runner: chaos/asr_45000006.sh
    description: Mock Volcengine to return 45000006 once; assert pipeline retries and completes.
  observable_signal: "grep 'volcengine_audio_fetch_failure_retry' /opt/Klik/logs/KK_asr.log\n→ if the\
    \ count is rising in production, retry IS working\n→ if you see pipeline_failed with status=45000006\
    \ and NO matching\n  retry log, the classifier regressed\n"
- id: BUG-2026-05-28-B
  title: Orchestrator asyncio.create_task retry from sync threadpool
  date: 2026-05-28
  surface: backend
  source_files:
  - /opt/Klik/KK_orchestrator/orchestrator_api.py
  user_visible_symptom: 'ASR-failed sessions were supposed to auto-retry with backoff but

    NEVER did. RuntimeError "no running event loop" caught by

    `except Exception: logger.warning(retry_schedule_failed)` so the

    dead retry was invisible.

    '
  lint:
  - rule: NO_SILENT_RETRY_SCHEDULE_FAILURE
    pattern: logger\.warning\([^)]*retry_schedule_failed
    message: retry scheduling failure must be logger.error (and paged); warning gets ignored
    file_types:
    - .py
    exclude_files:
    - test/
    - _test.py
  - rule: NO_SILENT_RETRY_SCHEDULE_FAILURE
    pattern: logger\.warning\([^)]*pipeline_.*_retry.*failed
    message: pipeline retry failure must be logger.error, warning hides the dead retry
    file_types:
    - .py
    exclude_files:
    - test/
    - _test.py
  - rule: NO_SILENT_RETRY_SCHEDULE_FAILURE
    pattern: logger\.warning\([^)]*retry_failed
    message: retry failure must be logger.error so monitoring sees it
    file_types:
    - .py
    exclude_files:
    - test/
    - _test.py
  chaos:
    runner: chaos/retry_schedule_fires.sh
    description: Force ASR to fail once; assert the retry actually fires within backoff window.
  observable_signal: 'pipeline_asr_auto_retry_scheduled event followed by a successful

    pipeline_completed for the same session_id. If the warning shows

    up alone the retry was scheduled but never ran.

    '
- id: BUG-2026-05-28-C
  title: Fabricated "Meeting on <date>" title hid failed and processing sessions
  date: 2026-05-28
  surface: backend
  source_files:
  - /opt/Klik/KK_frontendmobile/KK_frontendios/klik_api.py
  - /opt/Klik/KK_frontendmobile/KK_frontendios/transformers.py
  user_visible_symptom: 'Failed sessions and still-processing sessions rendered as a

    "Meeting on May 28, 2026" row indistinguishable from completed

    sessions. User had to escalate by email to discover bugs.

    '
  lint:
  - rule: NO_FABRICATED_FALLBACK_STRINGS
    pattern: title\s*=\s*f["\'](?:Meeting|Event|Session|Recording)\s+on\s+\{
    message: fabricated title from date — leave empty and expose status, do not invent a string
    file_types:
    - .py
    - .kt
    exclude_files:
    - test/
    - _test.py
    - Test.kt
  - rule: NO_FABRICATED_FALLBACK_STRINGS
    pattern: title\s*=\s*f["\'](?:Meeting|Event|Session|Recording)\s+\{[^}]*\[:8\]
    message: fabricated title from session_id prefix — leave empty and expose status
    file_types:
    - .py
    - .kt
    exclude_files:
    - test/
    - _test.py
    - Test.kt
  chaos:
    runner: chaos/failed_session_render.sh
    ios_edge: true
    description: Create a synthetic failed session; assert /api/v1/meetings returns title="" and status="failed",
      never a fabricated date.
  observable_signal: 'curl /api/v1/meetings | jq ''.items[] | select(.status=="failed").title''

    → must be "" for every failed row. Any non-empty title is a regression.

    '
- id: BUG-2026-05-28-D
  title: Pydantic build outside try/except returned bare 500 with no log
  date: 2026-05-28
  surface: backend
  source_files:
  - /opt/Klik/KK_meeting_minutes/meeting_minutes_api.py
  user_visible_symptom: 'LLM occasionally returned speakers=[None] inside Discussion.

    Pydantic raised ValidationError outside the LLM try/except, so

    FastAPI returned bare 500 to the orchestrator with no structured

    log. Orchestrator failed the session permanently.

    '
  lint:
  - rule: NO_UNGUARDED_LLM_RESPONSE_PARSING
    pattern: (?:[a-z_]*minutes_data|[a-z_]*llm_response|[a-z_]*llm_result|[a-z_]*generated)\.get\(["\']
    message: LLM-response.get(...) — verify the enclosing try/except covers the FULL parse (Pydantic build,
      list comprehension, schema validation), not just the LLM call
    file_types:
    - .py
    exclude_files:
    - test/
    - _test.py
  chaos:
    runner: chaos/llm_returns_null_in_array.sh
    description: Patch meeting_minutes to inject speakers=[None] from a stub LLM; assert the structured
      minutes_response_build_failed log is emitted before the 500.
  observable_signal: "grep 'minutes_response_build_failed' /opt/Klik/logs/KK_meeting_minutes.log\n→ presence\
    \ of this event means the guard fired correctly\n→ orchestrator pipeline_failed with stage=meeting_minutes\
    \ and NO\n  matching build_failed event = the guard regressed\n"
- id: BUG-2026-05-28-E
  title: Stop race — WS-disconnect fallback + speechbrain auto-spawn returned fake "no audio" on every
    successful Stop
  date: 2026-05-28
  surface: backend
  source_files:
  - /opt/Klik/KK_frontendmobile/KK_frontendios/iosback/streaming_api.py
  - /opt/Klik/KK_frontendmobile/KK_frontendios/iosback/stream_stage0_2_speechbrain_pipeline.py
  user_visible_symptom: 'iOS app showed "Session received no audio data" toast on every

    successful recording stop, even though the real session was

    fully processed by the orchestrator. Users thought their

    recordings had failed and re-recorded.

    '
  lint:
  - rule: NO_FALLBACK_FINALIZE_ON_DISCONNECT
    pattern: force_finalize_session\([^)]*\)\s*(?:#.*)?$\s*\)?\s*(?:except|finally)?
    message: force_finalize_session inside a disconnect/cleanup handler is a fallback path that races
      the legitimate /stop. Recording lifecycle must be owned by a single explicit endpoint.
    file_types:
    - .py
    exclude_files:
    - test/
    - _test.py
  - rule: NO_UNCONDITIONAL_NEXT_SESSION_SPAWN
    pattern: _create_new_session\([^)]*\)\s*(?:#|$)(?![\s\S]{0,200}user_stop)
    message: _create_new_session called unconditionally inside a finalize path — user_stop triggers must
      NOT spawn a successor session (the user said stop)
    file_types:
    - .py
    exclude_files:
    - test/
    - _test.py
  chaos:
    runner: chaos/stop_race_no_phantom_error.sh
    description: Submit a recording, send /stop, and assert the response status is 'success', never 'no_audio_frames'.
      Also assert no second SESSION_CREATED event fires between SESSION_FINALIZED and the orchestrator
      submit.
  observable_signal: "grep 'Stop failed.*no_audio_frames' /opt/Klik/logs/KK_frontendmobile.log\n→ ANY\
    \ occurrence after this fix landed = the race regressed\ngrep 'SESSION_CREATED.*timestamp_ms.*92100'\
    \ /opt/Klik/logs/KK_frontendmobile.log\n→ a SESSION_CREATED with a stream_offset matching a SESSION_FINALIZED\n\
    \  from the same stream means the user_stop guard regressed\n"
- id: BUG-2026-05-28-F
  title: CancellationException eaten as failure + URLSession recycle armed the refresh cooldown on every
    foreground, bricking all API calls
  date: 2026-05-28
  surface: ios
  source_files:
  - liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/data/network/HttpClient.kt
  - liquid/samples/composeApp/src/iosMain/kotlin/io/github/fletchmckee/liquid/samples/app/data/network/NativeHttpClient.ios.kt
  user_visible_symptom: 'On every brief app foreground (notification tap, Control Center,

    app switch), every backend call failed 401 for ~30 seconds while

    logs spammed "Token refresh cooling down (last attempt 0s ago),

    skipping". User saw "Initialization Error" toast offering to file

    a GitHub issue. Self-resolved after the cooldown expired and a

    refresh finally succeeded.

    '
  lint:
  - rule: NO_CATCH_CANCELLATION_AS_FAILURE
    pattern: catch\s*\(\s*\w+\s*:\s*(?:Exception|Throwable)\s*\)\s*\{[^}]*lastRefresh|catch\s*\(\s*\w+\s*:\s*(?:Exception|Throwable)\s*\)\s*\{[^}]{0,200}refresh.*=\s*false
    message: A bare catch(Exception) inside a token-refresh/auth path eats CancellationException. Catch
      CancellationException separately, reset any in-flight cooldown, and rethrow.
    file_types:
    - .kt
    exclude_files:
    - test/
    - Test.kt
  - rule: NO_UNCONDITIONAL_SESSION_RECYCLE
    pattern: foregroundEvents.*onEach.*\{.*isForeground.*recycleSession|isForeground.*->.*recycleSession\(
    message: Recycling the NSURLSession on every foreground event kills in-flight requests on every brief
      app switch. Gate the recycle behind a real staleness threshold (>=30s background).
    file_types:
    - .kt
    exclude_files:
    - test/
    - Test.kt
  chaos:
    runner: chaos/foreground_does_not_brick_auth.sh
    description: After backgrounding then immediately foregrounding the iOS app, the next backend call
      must succeed within 5s. ANY 'Token refresh cooling down' in the iOS logs within 30s of foreground
      = regression.
  observable_signal: "grep 'Token refresh cooling down (last attempt 0s ago)' iOS device logs\n→ presence\
    \ within 5s of a foreground event = regression\ngrep 'NSURLSession recycled' iOS device logs\n→ should\
    \ now include a 'backgrounded for Ns' reason and NEVER fire\n  on background<30s transitions\n"
- id: BUG-2026-05-29-A
  title: K1Type.X.copy(fontSize = N.sp) overrides bypassed K1FontSizeState scale and clipped time row
    under Dynamic Type
  date: 2026-05-29
  surface: ios
  source_files:
  - liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/ui/klikone/TodayScreen.kt
  - liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/ui/klikone/AskKlikSheet.kt
  - liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/ui/klikone/EntityDetailSheets.kt
  - liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/ui/klikone/LiveRecordingScreen.kt
  - liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/ui/klikone/MovesScreen.kt
  - liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/ui/klikone/NetworkScreen.kt
  user_visible_symptom: 'Today screen "UP NEXT" row clipped the time string to

    "12:32 AM - 12:…" the moment the user enlarged iOS Dynamic Type

    or K1FontSizeState. The chevron / KLIK DETECTED eyebrow / Retry

    pill / battery pill / unread count / org-initials avatar stayed

    visually tiny when everything else scaled. The clip wasn''t an

    ellipsis the user could expand — the text was simply gone.

    '
  lint:
  - rule: NO_FONTSIZE_OVERRIDE_ON_K1TYPE
    pattern: K1Type\.[a-zA-Z]+\.copy\([^)]*fontSize\s*=\s*\d+\.sp
    message: K1Type.X.copy(fontSize = N.sp) pins the size and bypasses K1FontSizeState scale → text stops
      responding to Dynamic Type. Pick the right K1Type variant (eyebrow/meta/metaSm/bodySm/bodyMd/…)
      or add one to the design system instead.
    file_types:
    - .kt
    exclude_files:
    - test/
    - Test.kt
    - KlikOneKit.kt
  - rule: NO_FIXED_DP_TIME_COLUMN
    pattern: Column\(\s*Modifier\.width\(\s*\d+\.dp\s*\)\s*\)\s*\{[^}]*m\.time
    message: Fixed-DP container around SP-scaled text clips under Dynamic Type. Let the column size to
      its content (drop the .width modifier) and use weight(1f) on the sibling.
    file_types:
    - .kt
    exclude_files:
    - test/
    - Test.kt
  - rule: NO_TEXTOVERFLOW_ELLIPSIS_MASKING_LAYOUT_BUG
    pattern: TextOverflow\.Ellipsis[^}]{0,400}m\.time|m\.time[^}]{0,400}TextOverflow\.Ellipsis
    message: Ellipsis on the meeting time is a silent-truncation fallback hiding a fixed-DP layout against
      SP-scaled text. Fix the layout (size to content) instead of masking it with ellipsis.
    file_types:
    - .kt
    exclude_files:
    - test/
    - Test.kt
  chaos:
    runner: chaos/dynamic_type_no_clip.sh
    description: Launch the iOS sim with UIPreferredContentSizeCategoryName = UICTContentSizeCategoryAccessibilityXXXL,
      navigate to Today, snapshot the UP NEXT row. Assert m.time renders unclipped (visible width = intrinsic
      width of the time string) AND no text in the row falls back to the default 12sp meta size. Repeat
      at the K1FontSizeState 0.8×, 1.0×, 1.2×, 1.5×, 2.0× steps.
  observable_signal: 'Visual: at iOS Accessibility XXXL the Today / Moves / Network /

    Live-Recording screens must render every text element scaled

    relative to K1Type''s base — nothing stays at a hardcoded sp. The

    UP NEXT row''s time column shows the full "12:32 AM - 12:32 AM"

    string, wrapped to a second line if it has to, but never clipped.

    Code: zero matches for `K1Type\.[a-zA-Z]+\.copy\(.*fontSize = \d+\.sp`

    across ui/klikone/ excluding KlikOneKit.kt itself.

    '
- id: BUG-2026-05-29-L
  title: Owlbots could never talk to each other — shouldRespond dropped ALL bot-authored messages, even
    explicit @mentions
  date: 2026-05-29
  surface: owlspace-cloud-host
  source_files:
  - /Users/wilsonxu/Owlspace_re/packages/owl-agent-server/src/stoat/bot-pool.ts
  user_visible_symptom: 'In a shared always-on channel, multiple owlbots each reply to the

    human but can never address one another. Asking a bot to "@mention"

    another bot does nothing — the target bot stays silent. Users see

    every bot say "I can''t message other agents / each session is

    isolated."

    '
  lint:
  - rule: NO_UNCONDITIONAL_BOT_AUTHOR_DROP
    pattern: knownBotIds\?\.has\(msg\.authorStoatId\)\)\s*return false[\s\S]{0,200}isExplicitlyMentioned
    message: bot-author guard placed BEFORE the explicit-mention check re-breaks bot-to-bot delegation.
      Explicit <@id>/@name must win first; only auto-replies to bots are blocked.
    file_types:
    - .ts
    exclude_files:
    - __tests__/
    - .test.ts
  chaos:
    runner: null
    description: Covered by owl-agent-server unit tests + a live cloud-host inject (Bob posts @Forming,
      assert Forming's WS logs decision=true and posts exactly one reply, then goes quiet).
  observable_signal: 'Cloud-host journal (ssh owlspace → journalctl -u owl-agent-server):

    a message authored by a known bot that @-mentions another bot must

    log `[bot-pool] decision=true ... botStoatId=<mentioned-bot>` followed

    by `SPAWNING session`. If it logs decision=false for an explicit

    @mention from a bot, the guard regressed. Runaway check: a bot→bot

    chain must stop within botHopBudget (6) hops — watch for

    `bot-hop budget (6) reached ... suppressing bot→bot reply`.

    '
- id: BUG-2026-05-29-B
  title: Bot reply truncated mid-sentence when the LLM stream is interrupted (no text_complete) — sink
    never finalized
  date: 2026-05-29
  surface: owlspace-cloud-host
  source_files:
  - /Users/wilsonxu/Owlspace_re/packages/owl-agent-server/src/stoat/channel-sink.ts
  user_visible_symptom: 'A bot''s reply in a channel is cut off mid-sentence (e.g. ends at an

    unclosed "(e.g. `M") and looks like a complete but nonsensical

    message. Recurs intermittently ("cut off again") whenever the

    upstream LLM stream drops mid-completion (proxy model_cooldown /

    provider failover / dropped connection).

    '
  lint:
  - rule: SINK_MUST_FINALIZE_ON_TERMINAL_EVENTS
    presence: required
    path: packages/owl-agent-server/src/stoat/channel-sink.ts
    pattern: finalizeInterrupted\(
    message: StoatChannelSink must call finalizeInterrupted() on terminal/default paths so a turn that
      ends without a clean text_complete is still finalized (not silently re-truncated). Presence = healthy.
    file_types:
    - .ts
    exclude_files:
    - __tests__/
    - .test.ts
  chaos:
    runner: null
    description: Covered by owl-agent-server unit tests (error + session_complete finalize, plus the "clean
      turn not marked" race guard).
  observable_signal: 'An interrupted reply now ends with the INTERRUPTED_MARKER

    ("⚠️ reply interrupted — the model stopped early") instead of being

    silently cut off. If channel replies are still truncating with NO

    marker, the sink stopped finalizing on error/session_complete.

    '
