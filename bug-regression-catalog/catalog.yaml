    runner: null
  observable_signal: "On the server, today's client logs must be canonical nested ECS:\n  f=$(ls -t /opt/Klik/logs/client/client_*.ndjson\
    \ | head -1)\n  tail -1 \"$f\" | jq -e '.service.name and (.log.level|test(\"^(debug|info|warning|error|critical)$\"\
    )) and (has(\"log.level\")|not) and (has(\"user.id\")|not)'\n→ exit 0 ⇒ contract holds (nested log.level\
    \ lowercase, service.name present, no flat keys).\n→ exit 1 ⇒ the flat-dotted client format regressed.\n\
    Frontend change-time guard: bash Klik_one/liquid/scripts/k1-guards.sh (rule\n\"No flat dotted ECS\
    \ @SerialName keys in logging/\"); contract test LogEntryEcsContractTest\n(iosSimulatorArm64Test /\
    \ testDebugUnitTest).\n"
