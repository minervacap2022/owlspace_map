  - id: BUG-2026-05-31-D
    title: AndroidKmpLibraryConventionPlugin set Kotlin jvmTarget=11 but not Android compileOptions — Java defaulted to 1.8, KGP "Inconsistent JVM-target" build failure
    date: 2026-05-31
    surface: android-frontend
    source_files:
      - Klik_newandroid/build-logic/convention/src/main/kotlin/AndroidKmpLibraryConventionPlugin.kt
    user_visible_symptom: |
      On the Klik_newandroid mirror, wiring the app-tests gate surfaced a latent
      build bug: `:core:testing:compileDebugKotlinAndroid` failed with
      "Inconsistent JVM-target compatibility detected for tasks
      'compileDebugJavaWithJavac' (1.8) and 'compileDebugKotlinAndroid' (11)".
      The AndroidKmpLibrary convention plugin set the Kotlin androidTarget
      jvmTarget to JVM_11 but never set the Android LibraryExtension
      compileOptions, so Java defaulted to 1.8 — a mismatch KGP fails hard on.
      Any module using that plugin (core:testing, etc.) couldn't compile its
      Android variant, so testDebugUnitTest never ran. The sibling
      KotlinMultiplatformConventionPlugin already set both sides to 11.
    lint:
      - rule: ANDROID_KMP_CONVENTION_MUST_SET_COMPILEOPTIONS
        presence: required
        globs: ['**/AndroidKmpLibraryConventionPlugin.kt']
        pattern: "compileOptions"
        message: "AndroidKmpLibraryConventionPlugin must set Android compileOptions (sourceCompatibility/targetCompatibility) to match the Kotlin androidTarget jvmTarget. Without it Java defaults to 1.8 and KGP fails 'Inconsistent JVM-target'. Inverted-intent: this match is the healthy state — file_types scope keeps it to the convention plugin."
        file_types: [".kt"]
        exclude_files: ["src/main/kotlin/KotlinMultiplatform", "samples/", "test/"]
    chaos:
      runner: null   # The real runtime guard is the app-tests CI job itself, which
                     # now runs :samples:composeApp:testDebugUnitTest — a JVM-target
                     # regression makes :core:testing fail to compile and the job goes
                     # red. The inverted-intent lint stops the compileOptions block
                     # from silently disappearing from the convention plugin.
      description: Android convention plugins must align Java and Kotlin JVM targets; the app-tests gate compiles :core:testing so any regression is caught.
    observable_signal: |
      `git grep -c "compileOptions" -- '*/AndroidKmpLibraryConventionPlugin.kt'`
      must be ≥1. If the block is removed, `./gradlew
      :samples:composeApp:testDebugUnitTest` fails at
      `:core:testing:compileDebugKotlinAndroid` with "Inconsistent JVM-target
      compatibility (1.8 vs 11)" — and the mirror's app-tests CI goes red.

  - id: BUG-2026-05-31-E
    title: SPM1423 PDM mic unpowered — AXP192 LDOIO0 rail never enabled, I2S read constant DC, every recording a ~58 Hz drone
    date: 2026-05-31
    surface: firmware-esp32
    source_files:
      - klik_esp32/main/klik_axp192.c
    user_visible_symptom: |
      Every klik recording came back as a loud ~58 Hz pure tone instead of
      speech; transcripts were empty/garbage. Root cause was hardware power,
      not DSP: on the M5StickC the SPM1423 PDM mic's VDD is the AXP192 LDOIO0
      rail (PMU GPIO0 in LDO mode). klik_axp192_init() never enabled it, so the
      mic was dead and the I2S PDM RX latched a constant DC value
      (~-30935 every sample) — a DC/near-DC signal that renders downstream as a
      ~58 Hz drone. Fixed by reg_write(0x90,0x02) (GPIO0 → LDO mode) +
      reg_write(0x91,0xF0) (LDOIO0 = 3.3 V) in init. Mic proven alive after.
    lint:
      - rule: AXP192_MUST_POWER_LDOIO0_FOR_MIC
        presence: required
        globs: ['**/klik_axp192.c']
        pattern: "0x90"
        message: "klik_axp192_init must enable LDOIO0 (reg 0x90=0x02 GPIO0→LDO mode, reg 0x91 voltage) to power the SPM1423 PDM mic. Without it the mic is unpowered and I2S reads constant DC → ~58 Hz drone, no audio. Inverted-intent: the presence of these register writes IS the healthy state."
        file_types: [".c"]
        exclude_files: ["build/"]
    chaos:
      runner: null   # No host-runnable runtime harness for physical-mic power — the
                     # real proof is a device recording whose WAV spectrum is broadband
                     # speech, not a DC drone. The presence lint (reg 0x90/0x91 writes)
                     # is the static guard; the boot self-test (dead-constant vs live
                     # signal) is the on-device runtime check.
      description: Mic power is a hardware-init invariant; the LDOIO0 register writes must remain in klik_axp192_init or audio dies silently into a DC drone.
    observable_signal: |
      A finalized recording WAV must show broadband speech-band content
      (spectral centroid ~400-660 Hz, flatness ~0.04-0.08), NOT the dead-mic
      signature (centroid ~58-59 Hz, flatness ~0.0007, raw PDM samples pinned
      near a constant ~-30935). `git grep -c "reg_write(0x90" -- '*/klik_axp192.c'`
      and `... "reg_write(0x91"` must each be ≥1; if either drops to 0 the mic
      power-up was removed and audio reverts to the 58 Hz drone.

  - id: BUG-2026-05-31-G
    title: systemd klik-launch.sh ran services with a bare env (no common.sh) — subscription_api /health KeyError crash-loop
    date: 2026-05-31
    surface: backend
    source_files:
      - /opt/Klik/deploy/scripts/klik-launch.sh
    user_visible_symptom: |
      After the nohup->systemd cutover, klik@subscription_api (port 8416) ran
      stable for ~20s then crash-looped (activating/failed, MainPID lost, orphan
      held the port -> "address already in use" flap). Root cause was NOT a fork
      or systemd supervision issue (uvicorn runs as a clean single process) — it
      was the ENVIRONMENT: restart_all.sh sources KK_common/scripts/common.sh and
      runs setup_paths -> load_config_from_yaml, which exports every
      KK_*_PORT/HOST + POSTGRES_*/REDIS_* + INTERNAL_API_KEY from config/*.yaml,
      so nohup services had them. klik-launch.sh (the systemd template launcher)
      did NOT source it, so the env was bare. subscription_api's config resolves
      ${KK_SUBSCRIPTION_PORT} on every /health hit; unset -> KeyError -> 500 ->
      the ~2s health probe tore the service down -> Restart=always flap. Fixed by
      making klik-launch.sh source common.sh + setup_paths (PR backend #851).
    lint:
      - rule: KLIK_LAUNCH_MUST_LOAD_COMMON_ENV
        presence: required
        globs: ['**/klik-launch.sh']
        pattern: "setup_paths"
        message: "klik-launch.sh must source KK_common/scripts/common.sh and call setup_paths so systemd services get the same env (KK_*_PORT etc. from config/*.yaml) the nohup model had. Removing it reverts to a bare env and any service resolving a ${KK_*_PORT} placeholder crash-loops. Inverted-intent: this match is the healthy state."
        file_types: [".sh"]
        exclude_files: ["test/", ".bak"]
    chaos:
      runner: null   # Reproducing needs the live systemd host + a config-resolving
                     # service. Guard = the inverted-intent lint (setup_paths present
                     # in klik-launch.sh) + the observable_signal below.
      description: The systemd launcher must load the same config-derived env the nohup model exported; without it, env-placeholder-resolving services crash-loop.
    observable_signal: |
