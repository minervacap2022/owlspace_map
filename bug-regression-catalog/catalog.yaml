  # ── 2026-05-31: the meta-bug — prevention authored but never enforced ───────

  - id: BUG-2026-05-31-A
    title: Anti-regression loop (guards + CI + hooks) authored but never committed — CI ran nothing, prevention prevented nothing
    date: 2026-05-31
    surface: tooling-ci
    source_files:
      - Klik_one/.github/workflows/k1-guards.yml
      - Klik_one/.github/workflows/app-tests.yml
      - Klik_one/liquid/scripts/repo-guards.sh
      - Klik_one/liquid/scripts/k1-guards.sh
    user_visible_symptom: |
      The Klik_one repo's first feedback loop — landmine guards, the app's
      ~197-test suite wired into CI, a pre-commit hook — was written across two
      sessions (2026-05-30/31) and reported "shipped", but every file was
      UNTRACKED (?? in git status). GitHub Actions had no workflow at the repo
      root, so CI ran nothing; the guards lived only in one working tree. The
      whack-a-mole bug pattern the loop was built to stop (64 fix vs 48 feat
      commits, MainApp.kt 61 edits) kept going unchecked. The fix for the bug
      factory was produced exactly the way the bug factory produces everything:
      done-in-the-tree, never enforced. Fixed by committing the loop (PR #2 on
      minervacap2022/Klik_one) — turning CI on immediately
      exposed THREE more instances of the same "green lives in one working tree,
      not git" disease, each surfaced only after the previous was fixed:
      BUG-2026-05-31-B (hardcoded local JDK path), BUG-2026-05-31-C (China-region
      Maven mirror), and compileTestKotlin failing because the
      NewRuleViewModelTest history() fix was ALSO uncommitted. Four faces, one
      root cause.
    chaos:
      runner: chaos/ci_loop_committed.sh
      description: |
        Asserts the loop is wired in, not just present: CI workflows are
        git-TRACKED at the repo root (Actions only reads .github/workflows at
        root), the guard scripts the workflows invoke are tracked, and both
        guards exit 0. Proven both directions 2026-05-31 — passes on the
        committed loop, FAILS (exit 1, "no committed CI workflows") on a repo
        where the loop is only in the working tree. Point it at another repo
        with KLIK_ONE_REPO=<path>.
    observable_signal: |
      `git ls-files .github/workflows | grep -cE '\.ya?ml$'` must be ≥1 — zero
      means CI is uncommitted and inert. Cross-check on GitHub:
      `gh run list --repo <owner>/<repo>` should show k1-guards + app-tests
      runs on every PR/push. No runs ever = the loop was authored but never
      committed (this bug). A lint regex CANNOT catch this — the failure is
      absence, so the guard is the chaos runner above.

