      "Value '/Library/Java/JavaVirtualMachines/temurin-17.jdk/Contents/Home'
      given for org.gradle.java.home Gradle property is invalid". The repo pins
      Gradle's JDK to an absolute path that only exists on the author's Mac.
      Locally it's load-bearing (this Mac's DEFAULT JDK is 25, which Gradle
      8.10.2 rejects, so the pin forces Gradle onto 17) — which is exactly why
      it was never noticed: it works on one machine and breaks everywhere else.
      A textbook "no hardcoded values" violation hiding in build config.
