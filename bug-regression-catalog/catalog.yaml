      went RED on main after OTA/firmware tests were ported from Klik_one: every
      test whose code path logs through the Android facade threw
      `java.lang.RuntimeException: Method i in android.util.Log not mocked` (9
      failures). Android's JVM unit-test target stubs framework classes to throw by
      default. Klik_one never hit this because it tests on the iOS native target
      (no android.util.Log). Fix: add `unitTests.isReturnDefaultValues = true` to
      the mirror's composeApp android { testOptions { } } so the log stub returns
      defaults instead of throwing. This is per-fork: it belongs in the Android
      mirror only, not Klik_one (which has no Android unit-test run).
    lint:
