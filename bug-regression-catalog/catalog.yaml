  - id: BUG-2026-06-01-O
    title: ESP32 NS double-windowed with no overlap-add (~50 Hz tremolo) — FIXED by WOLA rewrite
    date: 2026-06-01
    surface: firmware
    source_files:
      - klik_esp32/main/klik_ns.c
    user_visible_symptom: |
      With noise-suppression ON, recorded audio had a ~50 Hz amplitude tremolo and
      was badly degraded. klik_ns advanced a full 480-sample frame into a 512-pt FFT
      carrying only 32 samples of overlap, while applying a Hann window on BOTH
      analysis and synthesis — so the round trip multiplied each frame by ~w[i]^2
      (zero at frame edges). Reconstruction error ~70%; on-device frame-edge/center
      amplitude ratio measured 0.002.
      FIXED (2026-06-01): rewritten as a streaming weighted-overlap-add — sqrt-Hann
      analysis+synthesis (COLA-exact), FFT_N=512, HOP=256, sliding buffer + output
      FIFO. NS re-enabled by default; on-device ratio now 1.036 (flat).
    lint:
      - rule: NS_USE_PERIODIC_HANN_FOR_COLA
        presence: forbidden   # symmetric Hann ÷(FFT_N-1) = the tremolo bug; presence IS the bug
        pattern: 'cos[^;]*FFT_N\s*-\s*1'
        message: 'symmetric Hann (÷(FFT_N-1)) breaks 50%-overlap COLA — the original tremolo bug; use periodic Hann (÷FFT_N) so sqrt-Hann analysis·synthesis sums to 1'
        file_types: [".c"]
        exclude_files: ["test/", "tools/"]
      - rule: NS_NO_TINY_OVERLAP_BUFFER
        presence: forbidden   # the broken 32-sample overlap; presence IS the bug
        pattern: 's_overlap\s*\[\s*FFT_N\s*-\s*FRAME_N'
        message: 'reintroduces the broken 32-sample overlap (480-hop into 512-FFT) — use a proper HOP=FFT_N/2 streaming WOLA'
        file_types: [".c"]
        exclude_files: ["test/", "tools/"]
    chaos:
      runner: null   # firmware DSP; runs on-device, not in the backend chaos harness
      description: Offline guard is tools/ns_model_test.py — models the exact streaming windowing/OLA and FAILS if reconstruction error or per-frame envelope regresses.
    observable_signal: |
      python3 tools/ns_model_test.py   → exits 0 only if the streaming WOLA matches
      the trusted whole-signal reference (<2%) and the OLD scheme is shown broken
      (70% / edge→0). On device a tone through klik_ns_process must come out flat
      (frame edge/center amplitude ratio ~1.0, NOT ~0.002).

  - id: BUG-2026-06-01-B
    title: ESP32 NS bin gate used an absolute power threshold (scale-dependent)
    date: 2026-06-01
    surface: firmware
    source_files:
      - klik_esp32/main/klik_ns.c
    user_visible_symptom: |
      Quiet mic input (SPM1423 ~-50 dBFS) had whole speech bins zeroed because the
      per-bin gain used `gain = (pow > 1.0f) ? sqrt(out/pow) : 0` — an ABSOLUTE
      threshold in an otherwise ratio-based (scale-invariant) algorithm. This forced
      a +12 dB capture gain workaround that then clipped loud/close speech.
    lint:
      - rule: NO_ABSOLUTE_POWER_GATE_IN_NS
        pattern: 'pow\s*>\s*1\.0f'
        message: 'absolute power gate is scale-dependent; use a tiny epsilon (e.g. 1e-12f) as a divide-by-zero guard so NS stays ratio-based / scale-invariant'
        file_types: [".c"]
        exclude_files: ["test/", "tools/"]
    chaos:
      runner: null   # firmware DSP
      description: tools/ns_model_test.py measures gate scale-dependence (18.2% absolute vs 0.0% epsilon).
    observable_signal: |
      python3 tools/ns_model_test.py → the REV-2 section prints
      "output changes X% when input is scaled 8x"; must read ~0% (scale-invariant).

  - id: BUG-2026-06-01-C
    title: ESP32 re-entered BLE PAIR on every boot despite having paired before
    date: 2026-06-01
    surface: firmware
    source_files:
      - klik_esp32/main/klik_ble.c
      - klik_esp32/main/main.c
      - klik_esp32/main/klik_state_machine.c
    user_visible_symptom: |
      A device that had already paired/connected still booted into PAIR (blue slow
      blink, waiting for a central) after every power cycle, instead of recording.
      The boot decision gated on ctx->ble_paired / ctx->first_pair_done, both RAM
      flags reset to 0 by klik_sm_init on every boot. Fix: persist a "paired once"
      flag in NVS (klik_ble_mark_paired on connect) and restore first_pair_done at
      boot via klik_ble_paired_before().
    chaos:
      runner: null   # firmware; verified on-device
      description: After a central connects once, a reboot must skip PAIR and go to SAVE/REC. Factory reset (nvs erase) must restore first-use PAIR.
    observable_signal: |
      Serial after first connect: "SEC-003: marked paired — future boots skip PAIR".
      Serial on a subsequent boot: "Previously paired — boot will record, not enter
      PAIR" and STATE BOOT → SAVE (not → PAIR). First-ever boot (or post-factory-
      reset) must still show STATE BOOT → PAIR.

  - id: BUG-2026-06-01-D
    title: ESP32 OTA did not stop recording / enter OTA state (SM-010 violation)
    date: 2026-06-01
    surface: firmware
    source_files:
      - klik_esp32/main/klik_ota.c
    user_visible_symptom: |
      An OTA could be received while the device was actively recording, contending
      the flash bus (SPIFFS audio append vs esp_ota_write) — PRD SM-010 says OTA
      forbids recording. klik_ota_begin now calls klik_sm_on_ota(1) to stop capture
      and enter OTA state; klik_ota_abort calls klik_sm_on_ota(0) so a failed OTA
