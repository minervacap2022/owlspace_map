      "KeyError: ... Environment variable 'KK_..._PORT' is not set". Per service:
      `curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:<port>/health`
      must be 200, and `systemctl show klik@<svc> -p NRestarts` must stay flat.
      `grep -c setup_paths /opt/Klik/deploy/scripts/klik-launch.sh` must be >=1.

