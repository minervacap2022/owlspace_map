  - id: BUG-2026-06-01-K
    title: Built-in claude frozen at build time (DISABLE_AUTOUPDATER) with no runtime refresh path
    date: 2026-06-01
    surface: backend
    source_files:
      - Owl/Sources/App/macOS/Owl/Bootstrap/BundledBinaries.swift
      - Owl/Sources/App/macOS/Owl/Bootstrap/ClaudeUpdater.swift
      - Owl/Sources/App/macOS/Owl/Daemon/Owld.swift
    user_visible_symptom: |
      Every pane exports DISABLE_AUTOUPDATER=1, so the bundled @anthropic-ai/claude-code
      never self-updates; it only advanced when a new DMG was built+shipped+installed.
      npm publishes claude faster than DMGs ship, so the built-in CLI was perpetually
      behind "latest" (0.1.53 shipped 2.1.156 while npm latest was 2.1.159). Fix:
      ClaudeUpdater installs @latest into writable ~/OWLSpace/claude on launch, and
      Owld.claudeCommand resolves the pane's claude via BundledBinaries.claudeBinary()
      (prefers the self-refreshed copy when its semver >= bundled), NOT resolve("claude").
    lint:
      - rule: OWL_CLAUDECMD_NO_RAW_RESOLVE
        pattern: 'BundledBinaries\.resolve\("claude"\)'
        message: claudeCommand must build the pane command with claudeBinary() (the freshest-valid resolver), never the raw resolve("claude") which pins the frozen bundled copy.
        presence: forbidden
        globs: ['Owl/Sources/App/macOS/Owl/Daemon/Owld.swift']
    observable_signal: |
      `grep -c 'BundledBinaries.claudeBinary()' Owl/Sources/App/macOS/Owl/Daemon/Owld.swift`
      is >=1 and `grep -c 'resolve("claude")' .../Owld.swift` is 0. Unit suite
      OwlTests/ClaudeRefreshTests passes (semver ordering incl. 2.1.9 < 2.1.10, the
      prefer-writable-iff->=bundled rule, and the <=12h throttle).

  - id: BUG-2026-06-01-L
    title: KlikClientImpl connection flow pinned to Dispatchers.Default → intermittent NPE in the shared Kotlin/Native test binary (flaky CI)
    date: 2026-06-01
    surface: frontend
    source_files:
      - Klik_one/liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/data/klik/KlikClientImpl.kt
      - Klik_one/liquid/samples/composeApp/src/commonTest/kotlin/io/github/fletchmckee/liquid/samples/app/data/klik/KlikClientImplTest.kt
    user_visible_symptom: |
      KlikClientImpl.connect() ended with `.flowOn(Dispatchers.Default)`, so the
      whole connection state machine (incl. the 800ms POST_SUBSCRIBE settle and all
      emits) ran on the shared Native worker pool. Under load — once the commonTest
      binary grew from ~232 to ~836 tests, many connect() flows bridging runTest ↔
      Dispatchers.Default at once — `KlikClientImplTest."happy path emits Connected"`
      intermittently threw a bare kotlin.NullPointerException (passed in isolation
      and on rerun; failed ~1 in 5 full-suite runs). A flaky test is a lying feedback
      loop: it reddens CI spuriously and trains people to ignore red. Fix: inject
      `flowDispatcher` (default Dispatchers.Default — production unchanged) and pin it
      to StandardTestDispatcher(testScheduler) in every test, replacing the
      `while (...) yield()` real-time busy-waits with advanceUntilIdle(). Now
      deterministic (verified green 4x) and ~40% faster (virtual settle).
      Sibling cleanup in the same commit: KlikSessionOffsetStoreTest had a
      `private fun upsert(...)` that RE-IMPLEMENTED the store's logic and tested the
      copy (false-green — can never fail when the real store breaks); removed, and the
      missing injection seam on SecureStorageSessionOffsetStore flagged.
    lint:
      - rule: KLIKCLIENT_NO_HARDCODED_DISPATCHER
        pattern: 'flowOn\(Dispatchers\.Default\)'
        message: KlikClientImpl.connect must run on the injected flowDispatcher, never a hardcoded .flowOn(Dispatchers.Default) — a match means the testability seam was removed and the Dispatchers.Default flakiness can return.
        presence: forbidden
        globs: ['Klik_one/liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/data/klik/KlikClientImpl.kt']
    observable_signal: |
      `grep -c 'flowOn(flowDispatcher)' .../data/klik/KlikClientImpl.kt` is 1 and
      `grep -c 'flowOn(Dispatchers.Default)' .../KlikClientImpl.kt` is 0. The BLE test
      class no longer contains `while (` ... `) yield()` busy-waits (grep -c is 0 in
      KlikClientImplTest.kt). The full `:samples:composeApp:iosSimulatorArm64Test`
      suite is green across repeated runs (no intermittent NPE in KlikClientImplTest).

  - id: BUG-2026-06-01-M
    title: Klik_newandroid CI red — android.util.Log "not mocked" throws on testDebugUnitTest (missing returnDefaultValues)
    date: 2026-06-01
    surface: frontend
    source_files:
      - Klik_newandroid/samples/composeApp/build.gradle.kts
    user_visible_symptom: |
