- id: BUG-2026-06-01-L
  title: KlikClientImpl connection flow pinned to Dispatchers.Default → intermittent NPE in the shared
    Kotlin/Native test binary (flaky CI)
  date: 2026-06-01
  surface: frontend
  source_files:
  - Klik_one/liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/data/klik/KlikClientImpl.kt
  - Klik_one/liquid/samples/composeApp/src/commonTest/kotlin/io/github/fletchmckee/liquid/samples/app/data/klik/KlikClientImplTest.kt
  user_visible_symptom: 'KlikClientImpl.connect() ended with `.flowOn(Dispatchers.Default)`, so the

    whole connection state machine (incl. the 800ms POST_SUBSCRIBE settle and all

    emits) ran on the shared Native worker pool. Under load — once the commonTest

    binary grew from ~232 to ~836 tests, many connect() flows bridging runTest ↔

    Dispatchers.Default at once — `KlikClientImplTest."happy path emits Connected"`

    intermittently threw a bare kotlin.NullPointerException (passed in isolation

    and on rerun; failed ~1 in 5 full-suite runs). A flaky test is a lying feedback

    loop: it reddens CI spuriously and trains people to ignore red. Fix: inject

    `flowDispatcher` (default Dispatchers.Default — production unchanged) and pin it

    to StandardTestDispatcher(testScheduler) in every test, replacing the

    `while (...) yield()` real-time busy-waits with advanceUntilIdle(). Now

    deterministic (verified green 4x) and ~40% faster (virtual settle).

    Sibling cleanup in the same commit: KlikSessionOffsetStoreTest had a

    `private fun upsert(...)` that RE-IMPLEMENTED the store''s logic and tested the

    copy (false-green — can never fail when the real store breaks); removed, and the

    missing injection seam on SecureStorageSessionOffsetStore flagged.

    '
  lint:
  - rule: KLIKCLIENT_NO_HARDCODED_DISPATCHER
    pattern: flowOn\(Dispatchers\.Default\)
    message: KlikClientImpl.connect must run on the injected flowDispatcher, never a hardcoded .flowOn(Dispatchers.Default)
      — a match means the testability seam was removed and the Dispatchers.Default flakiness can return.
    presence: forbidden
    globs:
    - Klik_one/liquid/samples/composeApp/src/commonMain/kotlin/io/github/fletchmckee/liquid/samples/app/data/klik/KlikClientImpl.kt
  observable_signal: '`grep -c ''flowOn(flowDispatcher)'' .../data/klik/KlikClientImpl.kt` is 1 and

    `grep -c ''flowOn(Dispatchers.Default)'' .../KlikClientImpl.kt` is 0. The BLE test

    class no longer contains `while (` ... `) yield()` busy-waits (grep -c is 0 in

    KlikClientImplTest.kt). The full `:samples:composeApp:iosSimulatorArm64Test`

    suite is green across repeated runs (no intermittent NPE in KlikClientImplTest).

    '
