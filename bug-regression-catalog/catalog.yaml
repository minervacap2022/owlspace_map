- id: BUG-2026-06-01-N
  title: KK_common.__getattr__ doesn't resolve advertised submodules (logger/config/…) — import-order-dependent
    AttributeError
  date: 2026-06-01
  surface: backend
  source_files:
  - KK_common/__init__.py
  user_visible_symptom: 'KK_common/__init__.py lists submodules (auth, config, exceptions, logger,

    monitoring) in __all__, but its lazy __getattr__ only resolved a subset.

    `import KK_common; KK_common.logger...` (and `patch("KK_common.logger.X")`)

    therefore raised AttributeError on a fresh interpreter — and only "worked" if

    some earlier import happened to load the submodule first. A latent fragility:

    anything depending on attribute access (vs an explicit `from KK_common import

    logger`) breaks depending on import order. Fix: __getattr__ resolves any

    __all__ submodule via importlib.import_module, matching the existing lazy pattern.

    '
  lint:
  - rule: KK_COMMON_MUST_LAZY_IMPORT_SUBMODULES
    pattern: importlib\.import_module
    message: KK_common/__init__.py __getattr__ must lazily import the submodules advertised in __all__
      via importlib, so attribute access resolves regardless of import order.
    presence: required
    globs:
    - KK_common/__init__.py
  observable_signal: '`python -c "import KK_common; print(KK_common.logger.__name__, KK_common.config.__name__)"`

    succeeds from a fresh interpreter (no prior submodule import). AttributeError =>

    the lazy resolver regressed and import-order fragility is back.

    '
