    became tracked. The guard contained the exact legacy path that the repository-
    wide test correctly forbids, so CI failed despite all application code passing.
  observable_signal: |
    The GitHub pull-request merge ref must pass both the workspace path invariant
    test and scripts/repo-guards.sh after the guard itself is committed. The guard
    constructs the legacy path dynamically and contains no literal forbidden match.
  lint:
  - rule: WORKSPACE_GUARD_DOES_NOT_MATCH_ITSELF
    pattern: 'test ! -e "\$stale_workspace"'
    presence: required
    path: scripts/repo-guards.sh
    message: The canonical workspace guard must reuse its dynamically constructed legacy path so the committed guard cannot violate its own repository-wide invariant.
  chaos:
    runner: null
