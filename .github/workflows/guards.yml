name: guards

# Self-CI for the /no-new-bugs tooling. A feedback loop that isn't wired into CI is
# not a feedback loop (BUG-2026-05-31-A) — so the sector-map engine and the
# bug-regression catalog must stay green on a CLEAN checkout (a free foreign machine),
# not just on someone's working tree. The cross-repo production-rules-checker that a
# TARGET repo (klik/owl/eve) runs against its OWN code is a separate, copyable
# template: production-rules-checker/ci-template.yml.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  sector-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r sector_map/requirements.txt
      - name: Engine tests (universal parsing, call graph, dominant-lang, coverage, self-map)
        run: cd sector_map && python3 test_extract.py
      - name: CLI tests (path→sector, risk-first consumers, init)
        run: cd sector_map && python3 test_cli.py
      - name: Collector tests (schema, env, test-matrix, observability, context-map)
        run: cd sector_map && python3 test_collectors.py

  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install PyYAML
      - name: Loader invariants (no lying guards, every lint routes + classifies, unique ids)
        run: cd bug-regression-catalog && python3 scripts/test_load_catalog.py
      - name: Failed-session chaos runner contract
        run: cd bug-regression-catalog && bash scripts/test_failed_session_render.sh
      - name: Chaos — catalog has no lying guards
        run: cd bug-regression-catalog && bash scripts/chaos/catalog_no_lying_guards.sh

  # Producer-gate lint — the executable arm of nexora-policy policy/08 §4 (§7 step 3):
  # every skill declaring `tier: producer` MUST carry a non-empty `gates:` block, or it
  # is non-conforming. Before this job that contract was prose only, so a producer could
  # land ungated (no-bugs-first shipped with none). See nexora-policy#48.
  producer-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: pip install PyYAML
      - name: Lint test (fires on a planted violation, passes clean)
        run: cd scripts && python3 test_check_producer_gates.py
      - name: Simulation Contract skill routing test
        run: cd scripts && python3 test_check_simulation_contract_skill_refs.py
      - name: Skill installer regression (no nested skill dirs)
        run: python3 scripts/test_install_skill_symlink.py
      - name: Doctrine CI scaffold regression
        run: python3 scripts/test_check_doctrine_ci_scaffold.py
      - name: Doctrine self-update trust regression
        run: python3 scripts/test_doctrine_self_update.py
      - name: Every producer skill declares a gates block
        run: python3 scripts/check_producer_gates.py
      - name: Core skills route to canonical Simulation Contract policy
        run: python3 scripts/check_simulation_contract_skill_refs.py
      - name: Doctrine CI scaffold contract
        run: python3 scripts/check_doctrine_ci_scaffold.py

  # Aggregate evidence context consumed by nexora-policy governance. `if: always()`
  # makes upstream failure explicit instead of silently skipping the status.
  ci-success:
    needs: [sector-map, catalog, producer-gates]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: gate
        run: |
          if [ "${{ needs.sector-map.result }}" != "success" ] || \
             [ "${{ needs.catalog.result }}" != "success" ] || \
             [ "${{ needs.producer-gates.result }}" != "success" ]; then
            echo "upstream job failed"; exit 1
          fi
          echo "all upstream jobs green"
